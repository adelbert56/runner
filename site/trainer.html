<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>訓練計畫生成器 — 跑者廣場</title>
  <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg?v=20260621-icon2">
  <link rel="shortcut icon" href="./favicon.ico?v=20260621-icon2">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32.png?v=20260621-icon2">
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/apple-touch-icon.png?v=20260621-icon2">
  <link rel="stylesheet" href="./styles.css?v=20260529-message-list1">
  <style>
    /* === Reset & Variables === */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --c-bg: #f6f4ee;
      --c-surface: #fffdf8;
      --c-surface2: #fbf8f0;
      --c-border: #e2ded4;
      --c-text: #1f2a24;
      --c-text-muted: #65736b;
      --c-primary: #24724f;
      --c-primary-hover: #155338;
      --c-green: #24724f;
      --c-orange: #e8753d;
      --c-red: #b8523b;
      --c-blue: #dbeef3;
      --c-gray: #8c948f;
      --radius: 12px;
      --radius-sm: 8px;
      --c-shadow: 0 18px 48px rgba(31, 42, 36, 0.08);
      --c-shadow-soft: 0 10px 28px rgba(31, 42, 36, 0.07);
      --c-yellow: #f5c84c;
    }
    body { background: var(--c-bg); color: var(--c-text); font-family: "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif; min-height: 100vh; line-height: 1.6; }

    /* === Layout === */
    .view { display: none; }
    .view.active { display: block; }
    .container { max-width: 1400px; margin: 0 auto; padding: 24px 20px 28px; }

    .trainer-page { padding-bottom: 56px; }
    .trainer-hero {
      max-width: 1400px;
      margin: 0 auto;
      padding: 28px 20px 10px;
    }
    .trainer-hero-shell {
      position: relative;
      overflow: hidden;
      padding: 26px clamp(20px, 3vw, 34px);
      border: 1px solid rgba(31, 42, 36, 0.11);
      border-radius: 24px;
      background:
        radial-gradient(circle at 88% 18%, rgba(245, 200, 76, 0.32), transparent 16%),
        radial-gradient(circle at 8% 92%, rgba(36, 114, 79, 0.1), transparent 18%),
        linear-gradient(135deg, rgba(231, 242, 235, 0.94), rgba(255, 253, 248, 0.99) 58%, rgba(250, 244, 223, 0.94));
      box-shadow: 0 20px 48px rgba(31, 42, 36, 0.08);
    }
    .trainer-hero-shell::after {
      content: '';
      position: absolute;
      inset: auto -80px -120px auto;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(36, 114, 79, 0.12), transparent 68%);
      pointer-events: none;
    }
    .trainer-hero-layout {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(320px, 0.85fr);
      gap: 24px;
      align-items: stretch;
    }
    .trainer-hero-main { min-width: 0; }
    .trainer-hero-kicker {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255, 253, 248, 0.84);
      border: 1px solid rgba(31, 42, 36, 0.08);
      color: var(--c-primary-hover);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .trainer-hero-title {
      margin: 14px 0 12px;
      max-width: 10ch;
      font-size: clamp(2rem, 3.6vw, 3rem);
      line-height: 1.02;
      letter-spacing: -0.025em;
      color: var(--c-text);
      font-weight: 950;
    }
    .trainer-hero-copy {
      max-width: 720px;
      margin: 0;
      color: var(--c-text-muted);
      font-size: 0.98rem;
      line-height: 1.72;
      font-weight: 700;
    }
    .trainer-hero-stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 18px;
    }
    .trainer-stat {
      padding: 14px 14px 12px;
      border-radius: 18px;
      background: rgba(255, 253, 248, 0.88);
      border: 1px solid rgba(31, 42, 36, 0.08);
      box-shadow: 0 10px 20px rgba(31, 42, 36, 0.04);
    }
    .trainer-stat-label {
      font-size: 11px;
      font-weight: 900;
      color: var(--c-text-muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .trainer-stat-value {
      margin-top: 6px;
      font-size: 22px;
      line-height: 1.08;
      font-weight: 950;
      color: var(--c-text);
      letter-spacing: -0.03em;
    }
    .trainer-stat-sub {
      margin-top: 6px;
      font-size: 13px;
      line-height: 1.5;
      color: var(--c-text-muted);
      font-weight: 700;
    }
    .trainer-hero-points {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }
    .trainer-point {
      display: inline-flex;
      align-items: center;
      min-height: 38px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255, 253, 248, 0.9);
      border: 1px solid rgba(31, 42, 36, 0.08);
      color: var(--c-text);
      font-size: 0.9rem;
      font-weight: 850;
      line-height: 1.3;
      box-shadow: 0 12px 24px rgba(31, 42, 36, 0.05);
    }
    .trainer-hero-side {
      display: grid;
      gap: 12px;
      align-content: stretch;
    }
    .trainer-side-card {
      padding: 16px 16px 15px;
      border-radius: 20px;
      background: rgba(255, 253, 248, 0.86);
      border: 1px solid rgba(31, 42, 36, 0.08);
      box-shadow: 0 10px 22px rgba(31, 42, 36, 0.05);
      backdrop-filter: blur(6px);
    }
    .trainer-side-kicker {
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.06em;
      color: var(--c-primary-hover);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .trainer-side-title {
      font-size: 17px;
      line-height: 1.2;
      font-weight: 900;
      color: var(--c-text);
    }
    .trainer-side-copy {
      margin-top: 8px;
      font-size: 13px;
      color: var(--c-text-muted);
      line-height: 1.65;
      font-weight: 700;
    }
    .trainer-side-metric {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      margin-top: 12px;
      padding: 6px 12px;
      border-radius: 999px;
      background: #edf5ef;
      color: var(--c-primary-hover);
      font-size: 12px;
      font-weight: 900;
    }
    .trainer-side-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    .trainer-side-list {
      margin-top: 10px;
      display: grid;
      gap: 8px;
    }
    .trainer-side-item {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(247, 243, 234, 0.88);
      border: 1px solid rgba(31, 42, 36, 0.06);
    }
    .trainer-side-item b {
      font-size: 13px;
      color: var(--c-text);
      font-weight: 900;
    }
    .trainer-side-item span {
      font-size: 13px;
      color: var(--c-text-muted);
      font-weight: 700;
      text-align: right;
    }

    /* === Cards === */
    .card { background: var(--c-surface); border: 1px solid var(--c-border); border-radius: 18px; padding: 24px; margin-bottom: 20px; box-shadow: var(--c-shadow); }
    .card-title { font-size: 22px; font-weight: 850; margin-bottom: 18px; line-height: 1.3; letter-spacing: -0.02em; }

    /* === Buttons === */
    .btn { padding: 11px 20px; border-radius: var(--radius-sm); border: none; cursor: pointer; font-size: 14px; font-weight: 600; line-height: 1.35; transition: opacity 0.15s; }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: var(--c-primary); color: white; box-shadow: 0 10px 20px rgba(36, 114, 79, 0.18); }
    .btn-secondary { background: #f3efe5; color: var(--c-text); border: 1px solid var(--c-border); }
    .btn-danger { background: var(--c-red); color: white; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* === Form Elements === */
    .form-group { margin-bottom: 24px; }
    .form-label { display: block; font-size: 15px; font-weight: 600; margin-bottom: 10px; color: var(--c-text-muted); line-height: 1.5; }
    .form-input { width: 100%; padding: 12px 14px; background: var(--c-surface2); border: 1px solid var(--c-border); border-radius: var(--radius-sm); color: var(--c-text); font-size: 15px; line-height: 1.5; }
    .form-input:focus { outline: none; border-color: var(--c-primary); }
    .field-help { margin-top: 8px; font-size: 13px; color: var(--c-text-muted); line-height: 1.6; }
    .inline-help { display: inline-block; margin-left: 6px; font-size: 12px; color: var(--c-primary-hover); font-weight: 700; }
    .setup-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 18px; }
    .setup-actions .btn { flex: 1 1 220px; }
    details.card summary { cursor: pointer; font-size: 18px; font-weight: 700; list-style: none; }
    details.card summary::-webkit-details-marker { display: none; }
    details.card[open] summary { margin-bottom: 16px; }

    /* === Goal Cards === */
    .goal-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
    @media (max-width: 720px) { .goal-grid { grid-template-columns: 1fr; } }
    .goal-card { background: var(--c-surface2); border: 2px solid var(--c-border); border-radius: var(--radius-sm); padding: 18px 16px; cursor: pointer; text-align: center; transition: border-color 0.15s; }
    .goal-card:hover { border-color: var(--c-primary); }
    .goal-card.selected { border-color: var(--c-primary); background: #edf5ef; box-shadow: inset 0 0 0 1px rgba(36, 114, 79, 0.08); }
    .goal-card .goal-icon { font-size: 30px; margin-bottom: 8px; }
    .goal-card .goal-name { font-weight: 700; font-size: 16px; line-height: 1.4; }
    .goal-card .goal-desc { font-size: 13px; color: var(--c-text-muted); margin-top: 6px; line-height: 1.5; }
    .mode-brief {
      margin-top: 14px;
      padding: 16px 18px;
      border: 1px solid rgba(31, 42, 36, 0.08);
      border-radius: 12px;
      background: linear-gradient(180deg, rgba(237, 245, 239, 0.92), rgba(255, 253, 248, 0.98));
    }
    .mode-brief-kicker { font-size: 12px; font-weight: 900; color: var(--c-primary-hover); letter-spacing: 0.04em; text-transform: uppercase; }
    .mode-brief-title { margin-top: 6px; font-size: 18px; font-weight: 800; line-height: 1.4; }
    .mode-brief-copy { margin-top: 6px; font-size: 14px; color: var(--c-text-muted); line-height: 1.7; }
    .mode-brief-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; margin-top: 14px; }
    .mode-brief-item { padding: 12px; border-radius: 10px; background: rgba(255, 253, 248, 0.94); border: 1px solid rgba(31, 42, 36, 0.08); }
    .mode-brief-item b { display: block; margin-bottom: 4px; font-size: 12px; color: var(--c-text); }
    .mode-brief-item span { font-size: 13px; color: var(--c-text-muted); line-height: 1.6; }
    .mode-summary {
      margin-top: 14px;
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }
    .mode-summary-card {
      padding: 12px;
      border-radius: 10px;
      border: 1px solid rgba(31, 42, 36, 0.08);
      background: var(--c-surface2);
    }
    .mode-summary-card b { display: block; margin-bottom: 4px; font-size: 12px; color: var(--c-text); }
    .mode-summary-card span { font-size: 13px; color: var(--c-text-muted); line-height: 1.6; }

    /* === Day Picker === */
    .day-picker { display: flex; gap: 10px; flex-wrap: wrap; }
    .day-btn { width: 48px; height: 48px; border-radius: 50%; border: 2px solid var(--c-border); background: var(--c-surface2); color: var(--c-text-muted); font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
    .day-btn.training { border-color: var(--c-primary); background: #edf5ef; color: var(--c-primary-hover); }
    .day-btn.long-run { border-color: #295d6a; background: var(--c-blue); color: #295d6a; }
    .day-legend { display: flex; gap: 18px; margin-top: 12px; font-size: 13px; color: var(--c-text-muted); flex-wrap: wrap; }
    .day-legend span::before { content: '●'; margin-right: 4px; }
    .day-legend .l-train::before { color: var(--c-primary); }
    .day-legend .l-long::before { color: #60a5fa; }

    /* === Injury Pills === */
    .pill-group { display: flex; gap: 10px; flex-wrap: wrap; }
    .pill { padding: 8px 14px; border-radius: 20px; border: 1px solid var(--c-border); background: var(--c-surface2); color: var(--c-text-muted); font-size: 14px; cursor: pointer; transition: all 0.15s; }
    .pill.selected { border-color: var(--c-orange); background: #fff0e7; color: #9b4f2b; }

    /* === Live Calc === */
    .live-calc { background: var(--c-surface2); border: 1px solid var(--c-border); border-radius: var(--radius-sm); padding: 18px; }
    .live-calc-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; }
    @media (max-width: 720px) { .live-calc-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
    @media (max-width: 480px) { .live-calc-grid { grid-template-columns: 1fr; } }
    .calc-item { text-align: center; padding: 10px 8px; background: rgba(255, 253, 248, 0.92); border-radius: 10px; border: 1px solid rgba(31, 42, 36, 0.08); }
    .calc-label { font-size: 12px; color: var(--c-text-muted); margin-bottom: 6px; line-height: 1.4; }
    .calc-value { font-size: 20px; font-weight: 700; color: var(--c-primary); line-height: 1.3; }
    .calc-value.warn { color: var(--c-orange); }
    .calc-value.good { color: var(--c-green); }

    /* === Progress Card === */
    .progress-bar-wrap { background: var(--c-surface2); border-radius: 8px; height: 10px; margin: 10px 0; overflow: hidden; }
    .progress-bar-fill { height: 100%; background: var(--c-primary); border-radius: 8px; transition: width 0.3s; }
    .progress-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px 16px; font-size: 14px; color: var(--c-text-muted); }
    .progress-stats strong { color: var(--c-text); }
    .plan-overview { padding: 22px 24px; }
    .plan-overview-top { display: flex; justify-content: space-between; gap: 18px; align-items: flex-end; flex-wrap: wrap; }
    .plan-overview-kicker { font-size: 11px; font-weight: 900; letter-spacing: .07em; color: var(--c-primary-hover); text-transform: uppercase; }
    .plan-overview-title { margin: 3px 0 0; font-size: 24px; line-height: 1.2; letter-spacing: -.025em; }
    .plan-overview-meta { color: var(--c-text-muted); font-size: 14px; font-weight: 700; }
    .plan-progress-line { display:flex; justify-content:space-between; gap:12px; margin-top:18px; font-size:13px; color:var(--c-text-muted); font-weight:800; }
    .plan-progress-line strong { color: var(--c-text); }
    .plan-overview .progress-bar-wrap { height: 12px; margin: 9px 0 18px; background: #edf0e8; }
    .plan-overview .progress-bar-fill { min-width: 5px; background: linear-gradient(90deg, #24724f, #5fae79); }
    .plan-metric-grid { display:grid; grid-template-columns:repeat(4, minmax(0, 1fr)); gap:10px; }
    .plan-metric { padding: 12px 14px; border:1px solid rgba(31,42,36,.08); border-radius:14px; background:var(--c-surface2); }
    .plan-metric-label { display:block; font-size:12px; color:var(--c-text-muted); font-weight:800; }
    .plan-metric-value { display:block; margin-top:3px; font-size:18px; color:var(--c-text); font-weight:950; letter-spacing:-.02em; }
    .analysis-chart-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:18px; margin-top:20px; }
    .analysis-chart-card { padding:18px; border:1px solid var(--c-border); border-radius:16px; background:var(--c-surface2); }
    .analysis-chart-heading { display:flex; justify-content:space-between; gap:12px; align-items:flex-start; }
    .analysis-chart-heading b { font-size:16px; }
    .analysis-chart-heading p { font-size:13px; color:var(--c-text-muted); margin:5px 0 0; line-height:1.55; }
    .pace-trend-badge { flex:0 0 auto; padding:5px 9px; border-radius:999px; background:#e7f2eb; color:var(--c-primary-hover); font-size:11px; font-weight:900; }
    .pace-trend-summary { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:8px; margin:16px 0 12px; }
    .pace-trend-metric { padding:10px 11px; border:1px solid rgba(31,42,36,.08); border-radius:11px; background:rgba(255,253,248,.78); }
    .pace-trend-metric span { display:block; color:var(--c-text-muted); font-size:11px; font-weight:800; }
    .pace-trend-metric strong { display:block; margin-top:3px; color:var(--c-text); font-size:15px; letter-spacing:-.02em; }
    .pace-trend-metric strong.positive { color:var(--c-primary-hover); }
    .pace-trend-metric strong.caution { color:#a85c22; }
    .pace-trend-chart { width:100%; height:auto; display:block; overflow:visible; }
    .pace-trend-grid { stroke:rgba(101,115,107,.2); stroke-dasharray:3 5; }
    .pace-trend-axis-label { fill:#65736b; font-size:10px; font-weight:700; }
    .pace-trend-dot { fill:#24724f; stroke:#fffdf8; stroke-width:3; }
    .pace-trend-latest { fill:#fffdf8; stroke:#24724f; stroke-width:4; }
    .pace-trend-legend { display:flex; gap:12px; flex-wrap:wrap; margin-top:4px; font-size:11px; color:var(--c-text-muted); }
    .pace-trend-legend span::before { content:''; display:inline-block; width:8px; height:8px; margin-right:5px; border-radius:50%; background:#24724f; }
    .pace-trend-legend .average::before { border-radius:0; width:12px; height:2px; vertical-align:middle; background:#9aa79f; }
    .pace-trend-activities { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:8px; margin-top:14px; }
    .pace-trend-activity { min-width:0; padding:9px 10px; border-radius:10px; background:rgba(255,253,248,.72); border:1px solid rgba(31,42,36,.08); }
    .pace-trend-activity span { display:block; color:var(--c-text-muted); font-size:11px; font-weight:800; }
    .pace-trend-activity b { display:block; margin-top:3px; font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .pace-trend-activity small { display:block; margin-top:2px; color:var(--c-text-muted); font-size:11px; }

    /* === Phase Tabs === */
    .phase-tabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 6px; margin-bottom: 20px; }
    .phase-tab { padding: 10px 14px; border-radius: var(--radius-sm); border: 1px solid var(--c-border); background: var(--c-surface2); color: var(--c-text-muted); font-size: 13px; white-space: nowrap; cursor: pointer; line-height: 1.35; }
    .phase-tab.current { border-color: var(--c-primary); background: #edf5ef; color: var(--c-primary-hover); }
    .phase-tab.done { opacity: 0.6; }

    /* === Week Calendar === */
    .week-calendar { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; }
    .day-card { background: var(--c-surface); border: 2px solid var(--c-border); border-radius: var(--radius-sm); padding: 18px; transition: border-color 0.15s; }
    .day-card.today { border-color: var(--c-primary); box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
    .day-card.done-card { background: #14532d22; border-color: var(--c-green); }
    .day-card.garmin-card { border-color: #3b8f70; box-shadow: inset 0 0 0 1px rgba(59, 143, 112, 0.12); }
    .day-card.missed-card { background: #7f1d1d22; border-color: var(--c-red); }
    .day-card.deload-card { border-color: var(--c-orange); border-style: dashed; }
    .day-card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 12px; }
    .day-card-date { font-size: 13px; color: var(--c-text-muted); line-height: 1.4; }
    .day-card-today-badge { font-size: 11px; background: var(--c-primary); color: white; padding: 2px 8px; border-radius: 10px; }
    .workout-badge { display: inline-block; font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 10px; margin-bottom: 10px; }
    .badge-easy { background: #14532d; color: #86efac; }
    .badge-tempo { background: #fff0e7; color: #9b4f2b; }
    .badge-interval { background: #ffe0d5; color: #8a3521; }
    .badge-long { background: var(--c-blue); color: #295d6a; }
    .badge-rest { background: var(--c-surface2); color: var(--c-text-muted); }
    .day-card-task { font-size: 15px; font-weight: 700; margin-bottom: 6px; line-height: 1.5; }
    .day-card-pace { font-size: 13px; color: var(--c-text-muted); margin-bottom: 12px; line-height: 1.5; }
    .workout-steps { display: grid; gap: 10px; font-size: 13px; color: var(--c-text-muted); line-height: 1.8; }
    .step-card {
      padding: 12px;
      border: 1px solid rgba(31, 42, 36, 0.08);
      border-radius: 10px;
      background: rgba(251, 248, 240, 0.92);
    }
    .step-copy { min-width: 0; }
    .step-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 4px;
      flex-wrap: wrap;
    }

<script>
// ============================================================
// STORAGE
// ============================================================
const LEGACY_STORAGE_KEY = 'runner-trainer-v1';
const DEVICE_KEY = 'runner-trainer:device-id';
const STORAGE_KEY = `runner-trainer:${getDeviceId()}:v1`;
const PLAN_SCHEMA_VERSION = 8;
const GUIDE_ASSET_VERSION = 3;

function createEmptyData() {
  return { profile: null, plan: [], log: [], checkins: [], assessments: [], adaptationPrompts: {}, dayStatuses: {} };
}

function getDeviceId() {
  try {
    const existing = localStorage.getItem(DEVICE_KEY);
    if (existing) return existing;
    const nextId = globalThis.crypto?.randomUUID?.() || `device-${Date.now()}-${Math.random().toString(16).slice(2)}`;
    localStorage.setItem(DEVICE_KEY, nextId);
    return nextId;
  } catch {
    return 'shared-device';
  }
}

function normalizeDayStatuses(dayStatuses) {
  if (!dayStatuses || typeof dayStatuses !== 'object') return {};
  return Object.fromEntries(
    Object.entries(dayStatuses).filter(([, status]) => status === 'done' || status === 'missed')
  );
}

function collectLegacyDayStatuses(data) {
  const dayStatuses = {};
  (data?.plan || []).forEach(week => (week.days || []).forEach(day => {
    if (day?.dateStr && (day.status === 'done' || day.status === 'missed')) {
      dayStatuses[day.dateStr] = day.status;
    }
  }));
  (data?.log || []).forEach(entry => {
    if (entry?.date) {
      dayStatuses[entry.date] = 'done';
    }
  });
  return dayStatuses;
}

function applyStoredDayStatuses(data) {
  const dayStatuses = normalizeDayStatuses(data?.dayStatuses);
  (data?.plan || []).forEach(week => (week.days || []).forEach(day => {
    if (!day?.dateStr) return;
    const savedStatus = dayStatuses[day.dateStr];
    if (savedStatus) {
      day.status = savedStatus;
    }
  }));
  data.dayStatuses = dayStatuses;
  return data;
}

function normalizeData(data) {
  const base = createEmptyData();
  const normalized = {
    ...base,
    ...(data || {}),
    profile: data?.profile || null,
    plan: Array.isArray(data?.plan) ? data.plan : [],
    log: Array.isArray(data?.log) ? data.log : [],
    checkins: Array.isArray(data?.checkins) ? data.checkins : [],
    assessments: Array.isArray(data?.assessments) ? data.assessments : [],
    adaptationPrompts: data?.adaptationPrompts && typeof data.adaptationPrompts === 'object' ? data.adaptationPrompts : {},
    dayStatuses: normalizeDayStatuses(data?.dayStatuses)
  };
  normalized.dayStatuses = {
    ...collectLegacyDayStatuses(normalized),
    ...normalized.dayStatuses
  };
  return applyStoredDayStatuses(normalized);
}

function loadData() {
  try {
    const currentRaw = localStorage.getItem(STORAGE_KEY);
    if (currentRaw) {
      return normalizeData(JSON.parse(currentRaw));
    }
    const legacyRaw = localStorage.getItem(LEGACY_STORAGE_KEY);
    if (legacyRaw) {
      const migrated = normalizeData(JSON.parse(legacyRaw));
      localStorage.setItem(STORAGE_KEY, JSON.stringify(migrated));
      return migrated;
    }
    return createEmptyData();
  } catch {
    return createEmptyData();
  }
}

function saveData(data) {
  const normalized = normalizeData(data);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(normalized));
}

function weekHasMalformedVolume(week) {
  if (!week || !Array.isArray(week.days)) return true;
  const runDays = week.days.filter(day => ['easy', 'tempo', 'interval', 'long'].includes(day.type));
  if (!runDays.length) return false;
  const longDay = runDays.find(day => day.type === 'long');
  const longKm = longDay?.km || 0;
  return runDays.some(day => {
    if (day.type !== 'long' && longKm > 0 && (day.km || 0) >= longKm) return true;
    if (day.type === 'easy' && (day.km || 0) >= Math.max((week.targetKm || 0) * 0.75, 18)) return true;
    if ((day.km || 0) >= (week.targetKm || 0) * 0.9) return true;
    return false;
  });
}

function planHasMalformedTimeline(plan) {
  const dates = new Set();
  return plan.some((week, index) => {
    if (week?.weekNum !== index + 1 || !Array.isArray(week?.days) || week.days.length !== 7) return true;
    return week.days.some((day) => {
      if (!day?.dateStr || dates.has(day.dateStr)) return true;
      dates.add(day.dateStr);
      return false;
    });
  });
}

function shouldRebuildSavedPlan(data) {
  if (!data?.profile || !Array.isArray(data.plan) || data.plan.length === 0) return false;
  if ((data.profile.planVersion || 0) < PLAN_SCHEMA_VERSION) return true;
  return data.plan.some(weekHasMalformedVolume) || planHasMalformedTimeline(data.plan);
}

function rebuildStoredPlan(data) {
  if (!data?.profile) return data;
  const preservedProfile = { ...data.profile };
  preservedProfile.planVersion = PLAN_SCHEMA_VERSION;
  const rebuilt = applyStoredDayStatuses({
    ...data,
    plan: buildPlan(preservedProfile)
  }).plan;
  return {
    ...data,
    profile: preservedProfile,
    plan: rebuilt,
    log: data.log || [],
    checkins: data.checkins || [],
    assessments: data.assessments || [],
    adaptationPrompts: data.adaptationPrompts || {}
  };
}

let appData = loadData();
let setupReturnTab = 'week';

// ============================================================
// VIEW SWITCHING
// ============================================================
const UI_STATE_KEY = 'trainer-ui-state';

function saveUiState(patch) {
  try {
    const current = JSON.parse(localStorage.getItem(UI_STATE_KEY) || '{}');
    localStorage.setItem(UI_STATE_KEY, JSON.stringify({ ...current, ...patch }));
  } catch (err) { /* localStorage 不可用時直接略過 */ }
}

function loadUiState() {
  try {
    return JSON.parse(localStorage.getItem(UI_STATE_KEY) || '{}');
  } catch (err) {
    return {};
  }
}

function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  saveUiState({ view: name });
}

function renderGoalBrief(goal) {
  const meta = GOAL_META[goal] || GOAL_META.half;
  return `
    <div class="mode-brief">
      <div class="mode-brief-kicker">Mode Brief</div>
      <div class="mode-brief-title">${meta.icon} ${meta.label}</div>
      <div class="mode-brief-copy">${meta.handbook}</div>
      <div class="mode-brief-grid">
        <div class="mode-brief-item"><b>適合誰</b><span>${meta.suitable}</span></div>
        <div class="mode-brief-item"><b>生成重點</b><span>${meta.focus}</span></div>
        <div class="mode-brief-item"><b>手機手冊用途</b><span>${meta.exportUse}</span></div>
      </div>
    </div>`;
}

function renderHeroPanel() {
  const shell = document.getElementById('trainer-hero-shell');
  if (!shell) return;
  const profile = appData.profile;
  const hasPlan = Boolean(profile && appData.plan && appData.plan.length);
  const meta = profile ? (GOAL_META[profile.goal] || GOAL_META.half) : GOAL_META.half;
  const week = hasPlan ? (appData.plan[currentWeek - 1] || appData.plan[0]) : null;
  const totalWeeks = hasPlan ? appData.plan.length : null;
  const phaseText = week ? `${week.phaseLabel}` : '建立你的個人手冊';
  const progressText = hasPlan ? `第 ${currentWeek} / ${totalWeeks} 週` : '尚未建立';
  const targetDateText = profile?.targetDate || '先設定模式與比賽日';
  const paceText = profile?.racePaceSec ? `${secToPace(profile.racePaceSec)}/km` : '完成設定後帶入';
  const weeklyTarget = week?.targetKm ? `${week.targetKm} km` : '依可訓練日生成';
  shell.innerHTML = `
    <div class="trainer-hero-layout">
      <div class="trainer-hero-main">
        <div class="trainer-hero-kicker">Runner Planner · Active Plan</div>
        <h1 class="trainer-hero-title" id="trainer-hero-title">${hasPlan ? `${meta.label} · 第 ${currentWeek} 週` : '建立你的個人訓練計畫'}</h1>
        <p class="trainer-hero-copy">${hasPlan ? `目前處於「${phaseText}」。先完成本週的關鍵課與長跑，Garmin 實績和教練建議會在同一條流程裡協助你調整。` : '設定目標、可訓練日與目前跑量，建立一份能每天照著執行的個人訓練計畫。'}</p>
        <div class="trainer-hero-stats">
          <div class="trainer-stat">
            <div class="trainer-stat-label">訓練目標</div>
            <div class="trainer-stat-value">${meta.label}</div>

// ============================================================
// PACE UTILITIES
// ============================================================
function timeToSec(str) {
  if (!str) return 0;
  const parts = str.trim().split(':').map(Number);
  if (parts.some(Number.isNaN)) return 0;
  if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
  if (parts.length === 2) return parts[0] * 60 + parts[1];
  return 0;
}

function secToPace(sec) {
  if (!sec || sec <= 0) return '—';
  const rounded = Math.round(sec);
  const m = Math.floor(rounded / 60);
  const s = rounded % 60;
  return `${m}:${String(s).padStart(2, '0')}`;
}

function secToTime(sec) {
  if (!sec || sec <= 0) return '0:00:00';
  const rounded = Math.round(sec);
  const h = Math.floor(rounded / 3600);
  const m = Math.floor((rounded % 3600) / 60);
  const s = rounded % 60;
  return `${h}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
}

function localDateStr(date) {
  // toISOString 是 UTC，GMT+8 早上 8 點前會往前挪一天，害課表日期與 Garmin 對應錯位
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

function todayStr() {
  return localDateStr(new Date());
}

function guideAssetUrl(src) {
  if (!src) return '';
  const sep = src.includes('?') ? '&' : '?';
  return `${src}${sep}v=${GUIDE_ASSET_VERSION}`;
}

// ============================================================
// HEART-RATE ZONES & SEASON
// ============================================================
const DEFAULT_MAX_HR = 185;

function profileMaxHr(profile) {
  const own = Number(profile?.maxHr);
  if (own >= 140 && own <= 220) return own;
  const coach = Number(coachReviewData?.zones?.maxHr);
  if (coach >= 140 && coach <= 220) return coach;
  return DEFAULT_MAX_HR;
}

function hrZones(profile) {
  // 以 Z2 為輕鬆跑主區：E 上限 = 80% HRmax（Z2 頂），恢復跑再低一階
  const max = profileMaxHr(profile);
  const pct = (ratio) => Math.round(max * ratio);
  return {
    max,
    recoveryMax: pct(0.75),
    easyMax: pct(0.8),
    steadyLow: pct(0.8),
    steadyHigh: pct(0.84),
    tempoLow: pct(0.85),
    tempoHigh: pct(0.89),
    intervalLow: pct(0.9),
    intervalHigh: pct(0.95)
  };
}

function isHotSeasonDate(date) {
  const month = date.getMonth() + 1;
  return month >= 6 && month <= 9;
}

function adaptiveEasyPaceSec(profile, date) {
  // 兩層自適應：1) 有 Garmin 資料時用最近 Z2 實跑中位配速當基準（跑者變快課表跟著快）
  //            2) 依課表當週季節加減：夏季 +20 秒高溫稅、涼季 −15 秒涼爽紅利
  let baseSec = profile.easyPaceSec;
  let source = 'setup';
  try {
    const zones = hrZones(profile);
    const records = (typeof coachRunRecords === 'function' ? coachRunRecords() : [])
      .slice(-10)
      .filter((run) => run.hr && run.hr <= zones.easyMax && run.paceSeconds > 0);
    if (records.length >= 3) {
      const paces = records.map((run) => run.paceSeconds).sort((a, b) => a - b);
      baseSec = paces[Math.floor(paces.length / 2)];
      source = 'garmin';
    }
  } catch (err) { /* 教練資料未解鎖時退回設定值 */ }
  const seasonAdjust = date ? (isHotSeasonDate(date) ? 20 : -15) : 0;
  return { sec: Math.max(baseSec + seasonAdjust, 240), source };
}

function fitnessLevel(profile) {
  const gap = profile.easyPaceSec - profile.racePaceSec;
  if (profile.weeklyKm <= 10 || gap > 120) return 'beginner';
  if (gap > 60) return 'intermediate';
  return 'advanced';
}

function adjustPaceByRecentResult(profile) {
  if (!profile.recentResult) return;
  const match = profile.recentResult.match(/([\d.]+)\s*[kK]\s*(\d+):(\d+)(?::(\d+))?/);
  if (!match) return;
  const dist = parseFloat(match[1]);
  const sec = match[4]
    ? parseInt(match[2], 10) * 3600 + parseInt(match[3], 10) * 60 + parseInt(match[4], 10)
    : parseInt(match[2], 10) * 60 + parseInt(match[3], 10);
  if (!dist || !sec) return;
  const recentPaceSec = sec / dist;
  const derivedEasyPaceSec = recentPaceSec * 1.25;
  if (derivedEasyPaceSec > profile.easyPaceSec) {
    profile.easyPaceSec = derivedEasyPaceSec;
  }
  const goalDist = GOAL_DIST[profile.goal] || 10;
  const ratio = goalDist / dist;
  const impliedRacePaceSec = recentPaceSec * Math.pow(ratio, 0.07);
  if (impliedRacePaceSec < profile.racePaceSec) {
    profile.racePaceSec = impliedRacePaceSec;
    profile.tempoPaceSec = profile.racePaceSec + 12;
    profile.intervalPaceSec = Math.max(profile.racePaceSec - 10, 180);
  }
}

function initGoalPicker() {
  document.querySelectorAll('.goal-card').forEach(card => {
    card.addEventListener('click', () => {
      document.querySelectorAll('.goal-card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      formState.goal = card.dataset.goal;
      const brief = document.getElementById('goal-brief');
      if (brief) brief.innerHTML = renderGoalBrief(formState.goal);
      updateGenButton();
      updateLiveCalc();
    });
  });
}

function syncDayButtons() {
  document.querySelectorAll('.day-btn').forEach(btn => {
    const dow = parseInt(btn.dataset.dow, 10);
    btn.classList.toggle('training', formState.dayState[dow] === 1);
    btn.classList.toggle('long-run', formState.dayState[dow] === 2);
  });
}

function validateDays() {
  const warn = document.getElementById('day-warn');
  if (!warn) return;
  const trainDays = formState.dayState.filter(s => s >= 1).length;
  const longDays = formState.dayState.filter(s => s === 2).length;
  if (trainDays > 0 && longDays === 0) {
    warn.textContent = '請點兩下指定一天為長跑日（深藍）';
    warn.style.display = 'block';
  } else {
    warn.style.display = 'none';
  }
}

function initDayPicker() {
  document.querySelectorAll('.day-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const dow = parseInt(btn.dataset.dow, 10);
      const cur = formState.dayState[dow];
      if (cur === 0) {
        formState.dayState[dow] = 1;
      } else if (cur === 1) {
        formState.dayState = formState.dayState.map((s, i) => (i === dow ? 2 : (s === 2 ? 1 : s)));
      } else {
        formState.dayState[dow] = 0;
      }
      syncDayButtons();
      validateDays();
      updateLiveCalc();
      updateGenButton();
    });
  });
}

function initInjuryPills() {
  document.querySelectorAll('.pill[data-injury]').forEach(pill => {
    pill.addEventListener('click', () => {
      const injury = pill.dataset.injury;
      if (injury === 'none') {
        formState.injuries = ['none'];
        document.querySelectorAll('.pill[data-injury]').forEach(p => p.classList.remove('selected'));
        pill.classList.add('selected');
        return;
      }
      formState.injuries = formState.injuries.filter(i => i !== 'none');
      document.querySelector('.pill[data-injury="none"]')?.classList.remove('selected');
      if (formState.injuries.includes(injury)) {
        formState.injuries = formState.injuries.filter(i => i !== injury);
        pill.classList.remove('selected');
      } else {
        formState.injuries.push(injury);
        pill.classList.add('selected');
      }
      if (formState.injuries.length === 0) {
        formState.injuries = ['none'];
        document.querySelector('.pill[data-injury="none"]')?.classList.add('selected');
      }
    });
  });
}

function updateLiveCalc() {
  const dateVal = document.getElementById('f-date')?.value;
  const timeVal = document.getElementById('f-target-time')?.value;
  const easyVal = document.getElementById('f-easy-pace')?.value;
  const goal = formState.goal;
  const weeksEl = document.getElementById('calc-weeks');
  const warnEl = document.getElementById('date-warn');
  if (!weeksEl || !warnEl) return;

  if (!dateVal) {
    weeksEl.textContent = '—';
    weeksEl.className = 'calc-value';
    warnEl.style.display = 'none';
  } else {
    const diffWeeks = Math.floor((new Date(dateVal) - new Date()) / (1000 * 86400 * 7));
    if (diffWeeks < 0) {
      weeksEl.textContent = '已過期';
      weeksEl.className = 'calc-value warn';
      warnEl.textContent = '日期已過，請重新選擇。';
      warnEl.style.display = 'block';
    } else {
      weeksEl.textContent = `${diffWeeks} 週`;
      const minWeeks = goal ? MIN_WEEKS[goal] : 8;
      weeksEl.className = `calc-value${diffWeeks < minWeeks ? ' warn' : ' good'}`;
      if (diffWeeks > 0 && diffWeeks < minWeeks) {
        warnEl.textContent = `⚠️ 建議至少 ${minWeeks} 週，目前只有 ${diffWeeks} 週，計畫會壓縮。`;
        warnEl.style.display = 'block';
      } else if (diffWeeks > 24) {
        warnEl.textContent = `ℹ️ 距離比賽還有 ${diffWeeks} 週，計畫會維持適當強度。`;
        warnEl.style.display = 'block';
      } else {
        warnEl.style.display = 'none';
      }
    }
  }

  const dist = goal ? GOAL_DIST[goal] : 10;
  const timeSec = timeToSec(timeVal);
  let racePaceSec = 0;
  if (timeSec > 0 && dist > 0) {
    racePaceSec = timeSec / dist;
    document.getElementById('calc-race-pace').textContent = `${secToPace(racePaceSec)}/km`;
    document.getElementById('calc-race-pace').className = 'calc-value good';
    document.getElementById('calc-tempo').textContent = `${secToPace(racePaceSec + 12)}/km`;
    document.getElementById('calc-tempo').className = 'calc-value good';
    document.getElementById('calc-interval').textContent = `${secToPace(Math.max(racePaceSec - 10, 180))}/km`;
    document.getElementById('calc-interval').className = 'calc-value good';
  } else {
    ['calc-race-pace', 'calc-tempo', 'calc-interval'].forEach(id => {
      document.getElementById(id).textContent = '—';
      document.getElementById(id).className = 'calc-value';
    });
  }

  const trainCount = formState.dayState.filter(s => s >= 1).length;
  const daysEl = document.getElementById('calc-days');
  daysEl.textContent = trainCount > 0 ? `${trainCount} 天/週` : '—';
  daysEl.className = `calc-value${trainCount > 0 ? ' good' : ''}`;

  const diffEl = document.getElementById('calc-difficulty');
  const easyPaceSec = timeToSec(easyVal);
  if (racePaceSec > 0 && easyPaceSec > 0) {
    const gap = easyPaceSec - racePaceSec;
    if (gap < 30) {
      diffEl.textContent = '挑戰';
      diffEl.className = 'calc-value warn';
    } else if (gap < 90) {
      diffEl.textContent = '適中';
      diffEl.className = 'calc-value good';
    } else {
      diffEl.textContent = '保守';
      diffEl.className = 'calc-value good';
    }
  } else {
    diffEl.textContent = '—';
    diffEl.className = 'calc-value';
  }

  const bmiEl = document.getElementById('calc-bmi');
  if (bmiEl) {
    const h = parseFloat(document.getElementById('f-height')?.value) || 0;
    const w = parseFloat(document.getElementById('f-weight')?.value) || 0;
    if (h > 0 && w > 0) {
      const bmi = w / Math.pow(h / 100, 2);
      bmiEl.textContent = bmi.toFixed(1);
      bmiEl.className = `calc-value${bmi >= 18.5 && bmi < 25 ? ' good' : ' warn'}`;
    } else {
      bmiEl.textContent = '—';
      bmiEl.className = 'calc-value';
    }
  }
  const easyHrEl = document.getElementById('calc-easy-hr');
  if (easyHrEl) {
    const maxHrVal = parseInt(document.getElementById('f-max-hr')?.value, 10) || 0;
    if (maxHrVal >= 140 && maxHrVal <= 220) {
      easyHrEl.textContent = `≤${Math.round(maxHrVal * 0.8)} bpm`;
      easyHrEl.className = 'calc-value good';
    } else {
      easyHrEl.textContent = '—';
      easyHrEl.className = 'calc-value';
    }
  }
}

// PLAN GENERATION
// ============================================================
function calcWeeks(targetDate) {
  return Math.max(Math.floor((new Date(targetDate) - new Date()) / (1000 * 86400 * 7)), 1);
}

function buildPhases(goal, totalWeeks) {
  const configs = {
    '5k10k': [
      { name: 'base', label: '基礎建量', ratio: 0.4 },
      { name: 'build', label: '強化提升', ratio: 0.4 },
      { name: 'taper', label: '賽前減量', ratio: 0.2 }
    ],
    half: [
      { name: 'base', label: '基礎建量', ratio: 0.3 },
      { name: 'build', label: '強化提升', ratio: 0.35 },
      { name: 'peak', label: '高峰週期', ratio: 0.2 },
      { name: 'taper', label: '賽前減量', ratio: 0.15 }
    ],
    full: [
      { name: 'base', label: '基礎建量', ratio: 0.25 },
      { name: 'build1', label: '強化①', ratio: 0.25 },
      { name: 'build2', label: '強化②', ratio: 0.25 },
      { name: 'peak', label: '高峰週期', ratio: 0.15 },
      { name: 'taper', label: '賽前減量', ratio: 0.1 }
    ],
    rehab: [
      { name: 'light', label: '輕量恢復', ratio: 0.25 },
      { name: 'progress', label: '漸進強化', ratio: 0.35 },
      { name: 'solid', label: '鞏固基礎', ratio: 0.25 },
      { name: 'maintain', label: '維持訓練', ratio: 0.15 }
    ]
  };
  const template = configs[goal] || configs.half;
  let remaining = totalWeeks;
  return template.map((phase, index) => {
    const weeks = index === template.length - 1 ? remaining : Math.max(1, Math.round(totalWeeks * phase.ratio));
    remaining -= weeks;
    return { ...phase, weeks };
  });
}

function calcLongRunKm(targetKm, numTrain, maxMins, easyPaceSec, isTaper, goal) {
  const rule = GOAL_RULES[goal] || GOAL_RULES.half;
  const share = numTrain <= 2 ? Math.min(rule.longRunShare + 0.08, 0.45) : rule.longRunShare;
  let km = targetKm * share;
  if (easyPaceSec > 0) {
    km = Math.min(km, (maxMins * 60) / easyPaceSec);
  }
  km = Math.min(km, rule.longRunCapKm);
  if (isTaper) km *= 0.7;
  return Math.round(km * 10) / 10;
}

function calcWorkoutKm(type, targetKm, goal, longKm, focus = '') {
  const sharesByGoal = {
    '5k10k': { interval: 0.13, tempo: 0.17, easy: 0.2 },
    half: { interval: 0.12, tempo: 0.16, easy: 0.2 },
    full: { interval: 0.1, tempo: 0.15, easy: 0.18 },
    rehab: { interval: 0, tempo: 0.12, easy: 0.16 }
  };
  const goalShares = sharesByGoal[goal] || sharesByGoal.half;
  const share = goalShares[type] ?? 0.16;
  const focusFactor = type !== 'easy'
    ? 1
    : focus === 'recovery'
      ? 0.78
      : focus === 'rebuild'
        ? 0.72
        : focus === 'marathon'
          ? 1.08
          : focus === 'fueling'
            ? 0.96
      : focus === 'prelong'
        ? 0.88
        : focus === 'progression'
          ? 0.95
            : focus === 'strides'
            ? 0.9
            : 1;
  const baseKm = targetKm * share * focusFactor;
  const capped = longKm ? Math.min(baseKm, Math.max(longKm - 2, longKm * 0.78)) : baseKm;
  return Math.max(Math.round(capped * 10) / 10, type === 'interval' ? 4 : 5);
}

function canUseIntervalBySeason(weekStart) {
  const month = weekStart.getMonth() + 1;
  return month >= 9;
}

function buildWorkoutPattern(profile, numTrain, weekNum, phaseName, isDeload, hasInjury, isEarlyBeginner, weekStart) {
  const rule = GOAL_RULES[profile.goal] || GOAL_RULES.half;
  // 有傷史不整季禁品質課（教練規則：當週不穩才退級）；傷況調整在 buildWeekDays 做降階與提醒
  const qualityReady = weekNum >= rule.qualityAfterWeeks && !isDeload && !isEarlyBeginner;
  const canUseTempo = qualityReady && profile.goal !== 'rehab';
  const canUseInterval = canUseTempo && canUseIntervalBySeason(weekStart);
  const phaseBucket = ['base', 'light'].includes(phaseName) ? 'base' : ['peak', 'taper'].includes(phaseName) ? phaseName : 'build';
  const rotation = weekNum % 4;
  const easyFocusCycle = ['recovery', 'aerobic', 'prelong', 'progression'];
  const qualityType = !canUseTempo || phaseBucket === 'base'
    ? 'easy'
    : canUseInterval && (phaseBucket === 'peak' || rotation === 2)
      ? 'interval'
      : 'tempo';
  const qualityFocus = qualityType === 'interval'
    ? (phaseBucket === 'peak' ? 'specific' : rotation % 2 === 0 ? 'economy' : 'cruise')
    : qualityType === 'tempo'
      ? (phaseBucket === 'base' ? 'steady' : rotation % 2 === 0 ? 'cruise' : 'progression')
      : 'aerobic';

  if (profile.goal === 'rehab') {
    const rehabSessions = [
      { type: 'easy', focus: 'recovery', label: '恢復跑' },
      { type: 'easy', focus: rotation % 2 === 0 ? 'rebuild' : 'aerobic', label: rotation % 2 === 0 ? '跑走重建' : '穩定慢跑' },
      { type: 'easy', focus: 'prelong', label: '輕鬆喚醒' },
      { type: 'easy', focus: 'recovery', label: '恢復跑' }
    ];
    return rehabSessions.slice(0, Math.max(1, numTrain - 1));
  }

  if (profile.goal === 'full') {
    const fullQuality = qualityType === 'interval'
      ? { type: 'tempo', focus: 'marathon', label: '馬拉松穩定主課' }
      : qualityType === 'tempo'
        ? { type: 'tempo', focus: rotation % 2 === 0 ? 'marathon' : 'cruise', label: rotation % 2 === 0 ? '馬拉松穩定主課' : '巡航節奏主課' }
        : { type: 'easy', focus: 'marathon', label: '馬拉松穩定跑' };
    const fullSessions = [
      { type: 'easy', focus: 'recovery', label: '恢復跑' },
      fullQuality,
      { type: 'easy', focus: 'aerobic', label: '補充有氧' },
      { type: 'easy', focus: rotation % 2 === 0 ? 'fueling' : 'prelong', label: rotation % 2 === 0 ? '補給演練跑' : '長跑前喚醒' }
    ];
    return fullSessions.slice(0, Math.max(1, numTrain - 1));
  }

  if (profile.goal === '5k10k') {
    const entryQuality = qualityType === 'interval'
      ? { type: 'interval', focus: rotation % 2 === 0 ? 'economy' : 'cruise', label: '速度感主課' }
      : qualityType === 'tempo'
        ? { type: 'tempo', focus: rotation % 2 === 0 ? 'steady' : 'progression', label: rotation % 2 === 0 ? '穩定節奏課' : '漸進節奏課' }
        : { type: 'easy', focus: 'aerobic', label: '穩定慢跑' };
    const entrySessions = [
      { type: 'easy', focus: 'recovery', label: '恢復跑' },
      entryQuality,
      { type: 'easy', focus: canUseInterval ? 'strides' : 'progression', label: canUseInterval ? '輕鬆跑 + 加速跑' : '漸進慢跑' },
      { type: 'easy', focus: 'prelong', label: '週末前喚醒' }
    ];
    return entrySessions.slice(0, Math.max(1, numTrain - 1));
  }

  if (numTrain <= 2) {
    return [{ type: 'easy', focus: 'aerobic', label: '單週維持跑' }];
  }

  if (numTrain === 3) {
    if (qualityType === 'easy') {
      return [
        { type: 'easy', focus: 'recovery', label: '恢復跑' },
        { type: 'easy', focus: rotation % 2 === 0 ? 'prelong' : 'aerobic', label: rotation % 2 === 0 ? '長跑前喚醒' : '穩定有氧' }
      ];
    }
    return rotation % 2 === 0
      ? [
          { type: qualityType, focus: qualityFocus, label: qualityType === 'interval' ? '本週主課' : '本週節奏主課' },
          { type: 'easy', focus: 'prelong', label: '長跑前喚醒' }
        ]
      : [
          { type: 'easy', focus: 'recovery', label: '恢復跑' },
          { type: qualityType, focus: qualityFocus, label: qualityType === 'interval' ? '本週主課' : '本週節奏主課' }
        ];
  }

  if (numTrain === 4) {
    if (qualityType === 'easy') {
      return [
        { type: 'easy', focus: 'recovery', label: '恢復跑' },
        { type: 'easy', focus: 'aerobic', label: '穩定有氧' },
        { type: 'easy', focus: 'prelong', label: '長跑前喚醒' }
      ];
    }
    return [
      { type: 'easy', focus: 'recovery', label: '恢復跑' },
      { type: qualityType, focus: qualityFocus, label: qualityType === 'interval' ? '本週主課' : '本週節奏主課' },
      { type: 'easy', focus: rotation % 2 === 0 ? 'prelong' : 'aerobic', label: rotation % 2 === 0 ? '長跑前喚醒' : '穩定有氧' }
    ];
  }

  const sessions = [
    { type: 'easy', focus: 'recovery', label: '恢復跑' },
    qualityType === 'easy'
      ? { type: 'easy', focus: 'aerobic', label: '穩定有氧' }
      : { type: qualityType, focus: qualityFocus, label: qualityType === 'interval' ? '本週主課' : '本週節奏主課' },
    { type: 'easy', focus: 'aerobic', label: '穩定有氧' },
    { type: 'easy', focus: canUseInterval && phaseBucket !== 'base' ? 'strides' : easyFocusCycle[rotation], label: canUseInterval && phaseBucket !== 'base' ? '輕鬆跑 + 加速跑' : '補充有氧' }
  ];
  return sessions.slice(0, Math.max(0, numTrain - 1));
}

function buildWorkoutContent(type, km, profile, phaseName, weekNum, isDeload, isTaper, focus = '', label = '') {
  const generatedAtForPace = profile.generatedAt ? new Date(profile.generatedAt) : new Date();
  const paceAnchor = new Date(generatedAtForPace);
  paceAnchor.setDate(generatedAtForPace.getDate() + (weekNum - 1) * 7);
  const easyAdaptive = adaptiveEasyPaceSec(profile, paceAnchor);
  const tempo = secToPace(profile.tempoPaceSec);
  const interval = secToPace(profile.intervalPaceSec);
  const easy = secToPace(easyAdaptive.sec);
  const fastEasy = easyAdaptive.sec > 255 ? secToPace(easyAdaptive.sec - 15) : easy;
  const goal = profile.goal || 'half';
  const phaseBucket = ['base', 'light'].includes(phaseName) ? 'base' : ['peak', 'taper'].includes(phaseName) ? phaseName : 'build';
  const goalBias = { '5k10k': 0, half: 1, full: 2, rehab: 3 }[profile.goal] || 0;
  const rotation = (weekNum + goalBias) % 4;
  const generatedAt = profile.generatedAt ? new Date(profile.generatedAt) : new Date();
  const weekAnchor = new Date(generatedAt);
  weekAnchor.setDate(generatedAt.getDate() + (weekNum - 1) * 7);
  const allowSummerStrides = canUseIntervalBySeason(weekAnchor);

  if (type === 'easy') {
    const variants = [
      {
        task: `${label || '輕鬆跑'} ${km} km`,
        pace: `配速 ${easy}/km`,
        steps: [
          { icon: '🚶', title: '熱身', dose: '5–8 分', detail: focus === 'recovery' ? '先把雙腿走開，不急著進入跑步節奏。' : '步行 + 動態伸展，喚醒髖部與小腿。' },
          { icon: '🏃', title: '主課', dose: `${km} km`, detail: focus === 'recovery' ? `今天是恢復跑，只要順順完成 ${km} km，配速 ${easy}/km 不追快。` : `全程維持輕鬆跑，配速 ${easy}/km，以可對話為原則。` },
          { icon: '🧘', title: '收操', dose: '5–8 分', detail: '慢跑降速 + 靜態伸展，尤其小腿、臀肌與股四頭。' }
        ]
      },
      {
        task: `${label || '輕鬆跑'} ${km} km + 加速跑`,
        pace: `配速 ${easy}/km`,
        steps: [
          { icon: '🚶', title: '熱身', dose: '8–10 分', detail: '慢走、開髖、腿後勾與高抬腿，先把步幅打開。' },
          { icon: '🏃', title: '主課', dose: `${Math.max(3, Math.round((km - 0.8) * 10) / 10)} km + 4×100m`, detail: `先完成輕鬆跑，再做 4 趟 100m 放鬆加速，提升步頻但不衝刺。` },
          { icon: '🧘', title: '收操', dose: '5–8 分', detail: '走跑交替降心率，最後做小腿、臀肌與髂脛束伸展。' }
        ]
      },
      {
        task: `${label || '輕鬆漸進跑'} ${km} km`,
        pace: `配速 ${easy} 起，最後收至 ${fastEasy}/km`,
        steps: [
          { icon: '🚶', title: '熱身', dose: '8 分', detail: '先以慢走與動態伸展啟動，再進入很輕鬆的慢跑。' },
          { icon: '🏃', title: '主課', dose: `${km} km`, detail: focus === 'prelong' ? `今天像長跑前喚醒：先輕鬆跑，最後 10–15 分鐘自然收快到 ${fastEasy}/km，不硬頂。` : `前段維持 ${easy}/km，最後 15 分鐘自然收快到 ${fastEasy}/km，不硬頂。` },
          { icon: '🧘', title: '收操', dose: '5–8 分', detail: '慢跑降速後補水，結束前做 2–3 個下肢伸展動作。' }
        ]
      },
      {
        task: `${label || '有氧穩定跑'} ${km} km`,
        pace: `配速 ${easy}/km`,
        steps: [
          { icon: '🚶', title: '熱身', dose: '6–8 分', detail: '先走再跑，把呼吸和步幅順起來。' },
          { icon: '🏃', title: '主課', dose: `${km} km`, detail: focus === 'aerobic' ? `今天是穩定有氧日，整段維持穩定節奏，不追速度，像在「存體能」。` : `整段維持穩定有氧，不追速度，讓今天像在「存體能」。` },
          { icon: '🧘', title: '收操', dose: '5–8 分', detail: '慢走、補水、簡單伸展，留一點餘裕給明後天。' }
        ]
      }
    ];
    const focusMap = {
      recovery: variants[0],
      strides: allowSummerStrides ? variants[1] : variants[3],
      progression: variants[2],
      prelong: variants[2],
      rebuild: variants[0],
      marathon: variants[3],
      fueling: variants[3],
      aerobic: variants[3]
    };
    const variantPool = allowSummerStrides ? variants : [variants[0], variants[2], variants[3]];
    const variant = isDeload || isTaper
      ? variants[0]
      : focusMap[focus] || variantPool[phaseBucket === 'base' ? rotation % Math.min(2, variantPool.length) : rotation % variantPool.length];
    if (focus === 'rebuild') {
      variant.task = `${label || '跑走重建'} ${km} km`;
      variant.pace = `配速 ${easy}/km 或跑走交替`;
      variant.steps[1].detail = `今天重點是重新建立規律，不求整段都跑，必要時可用跑 4–6 分 / 走 1 分完成 ${km} km。`;
    } else if (focus === 'marathon') {
      variant.task = `${label || '馬拉松穩定跑'} ${km} km`;
      variant.steps[1].detail = `今天像全馬教練安排的補充有氧：穩定完成 ${km} km，讓週量和耐力慢慢墊起來。`;
    } else if (focus === 'fueling') {
      variant.task = `${label || '補給演練跑'} ${km} km`;
      variant.steps[1].detail = `今天不是拚速度，而是邊跑邊練喝水、補給和穩定節奏，先把全馬需要的節奏建立起來。`;
    }
    variant.paceSource = easyAdaptive.source;
    return variant;
  }

  if (type === 'tempo') {
    const blockKm = Math.max(1, Math.round((km / 2.5) * 10) / 10);
    const variants = [
      {
        task: `${label || '節奏跑'} ${km} km`,
        pace: `配速 ${tempo}/km`,
        steps: [
          { icon: '🚶', title: '熱身', dose: '10 分', detail: `慢跑（${easy}/km）+ 動態伸展 + 2 趟短加速。` },
          { icon: '🔥', title: '主課', dose: `${km} km`, detail: `連續節奏跑，配速 ${tempo}/km，維持穩定但可控制的吃力感。` },
          { icon: '🧘', title: '收操', dose: '5–10 分', detail: '慢跑降速，收掉心率，再做靜態伸展。' }
        ]
      },
      {
        task: `${label || '節奏分段跑'} ${km} km`,
        pace: `配速 ${tempo}/km`,
        steps: [
          { icon: '🚶', title: '熱身', dose: '12 分', detail: `慢跑 + 動態伸展，最後做 2 趟 80m 加速，準備進入閾值區。` },
          { icon: '🔥', title: '主課', dose: `2×${blockKm} km`, detail: `兩段節奏跑，配速 ${tempo}/km，中間慢跑 3 分鐘恢復，練穩定輸出。` },
          { icon: '🧘', title: '收操', dose: '8–10 分', detail: '慢跑降速，把呼吸和步頻整理回輕鬆區。' }
        ]
      },
      {
        task: `${label || '漸進節奏跑'} ${km} km`,
        pace: `由 ${easy}/km 收至 ${tempo}/km`,
        steps: [
          { icon: '🚶', title: '熱身', dose: '10 分', detail: '慢跑啟動 + 下肢動態伸展，讓步頻先順起來。' },
          { icon: '🔥', title: '主課', dose: `${km} km`, detail: `前半先在輕鬆偏穩定節奏，後半逐步收快到 ${tempo}/km，練配速控制。` },
          { icon: '🧘', title: '收操', dose: '5–8 分', detail: '慢跑降速，再做髖部與小腿伸展。' }
        ]
      },
      {
        task: `${label || '穩定節奏巡航'} ${km} km`,
        pace: `配速 ${tempo}/km`,
        steps: [
          { icon: '🚶', title: '熱身', dose: '10–12 分', detail: '慢跑啟動，加上 2 趟輕快加速，把步頻先喚醒。' },
          { icon: '🔥', title: '主課', dose: `${Math.max(2, Math.round(km * 0.7 * 10) / 10)} km`, detail: `今天像真人教練帶的穩定主課：節奏要平、呼吸要穩，不用硬衝。` },
          { icon: '🧘', title: '收操', dose: '6–8 分', detail: '慢跑降速，再做小腿、臀部和腿後側伸展。' }
        ]
      }
    ];
    const focusMap = {
      steady: variants[0],
      cruise: variants[1],
      progression: variants[2],
      marathon: variants[3]
    };
    const variant = isDeload ? variants[0] : focusMap[focus] || variants[phaseBucket === 'peak' ? 1 : rotation % variants.length];
    if (focus === 'marathon') {
      variant.task = `${label || '馬拉松穩定主課'} ${km} km`;
      variant.pace = `配速 ${tempo}/km 附近`;
      variant.steps[1].detail = `今天不是衝閾值，而是練全馬需要的穩定輸出與呼吸節奏，整體感受要穩而不爆。`;
    }
    return variant;
  }

  if (type === 'interval') {
    const sets400 = Math.max(4, Math.min(8, Math.round(km / 0.4)));
    const sets800 = Math.max(3, Math.min(6, Math.round(km / 0.8)));
    const sets1k = Math.max(3, Math.min(5, Math.round(km)));
    const variants = [
      {

function buildRestDayCard(dow, dateStr, profile, today, weekNum = 1) {
  const prevState = profile.dayState[(dow + 6) % 7];
  const nextState = profile.dayState[(dow + 1) % 7];
  const betweenRuns = prevState >= 1 && nextState >= 1;
  const hasInjury = !profile.injuries.includes('none');
  return {
    dow,
    dateStr,
    type: 'rest',
    isToday: dateStr === today,
    status: 'upcoming',
    task: betweenRuns ? '肌力 / 核心 + 恢復' : '主動恢復 / 完全休息',
    supportBlocks: buildSupportBlocks(betweenRuns ? 'strength' : 'recovery', hasInjury, profile, weekNum, dow)
  };
}

function buildDayCard(dow, dateStr, type, km, profile, isDeload, isTaper, hasInjury, today, weekNum = 1, phaseName = 'build', focus = '', label = '') {
  const card = { dow, dateStr, type, km, isToday: dateStr === today, status: 'upcoming', isDeload, weekNum, phaseName, focus, label };
  const content = buildWorkoutContent(type, km, profile, phaseName, weekNum, isDeload, isTaper, focus, label);
  card.task = content.task;
  card.pace = content.paceSource === 'garmin' ? `${content.pace}（Garmin Z2 校正）` : content.pace;
  card.steps = content.steps;

  const zones = hrZones(profile);
  card.hrTarget = type === 'easy'
    ? (focus === 'recovery' ? `HR ≤${zones.recoveryMax}` : `HR ≤${zones.easyMax}`)
    : type === 'long'
      ? `HR ≤${zones.easyMax}`
      : type === 'tempo'
        ? `HR ${zones.tempoLow}–${zones.tempoHigh}`
        : type === 'interval'
          ? `HR ${zones.intervalLow}–${zones.intervalHigh}`
          : '';
  if (hasInjury && ['tempo', 'interval'].includes(type)) {
    card.injuryNote = '傷處（左腳等）當天有任何不穩或異樣 → 本課改輕鬆跑，當週退回上一級跑量。';
  }
  if (dateStr && isHotSeasonDate(new Date(`${dateStr}T00:00:00`)) && ['easy', 'long', 'tempo', 'interval'].includes(type)) {
    card.heatNote = type === 'tempo' || type === 'interval'
      ? '高溫期：以心率與體感為準，配速 +20–40 秒/km 屬正常；超出心率上限就降速或縮短快段。'
      : `高溫期：守心率不守配速（+20–40 秒/km 屬正常）；HR 超過 ${zones.easyMax + 5} 就走 1 分鐘再跑，長課帶水。`;
  }

  if (isDeload && type !== 'rest') {
    card.task = `${card.task} · 減量週`;
  } else if (isTaper && type !== 'rest') {
    card.task = `${card.task} · 賽前減量`;
  }
  return card;
}

function buildWeekDays(profile, trainDows, longDow, otherDows, targetKm, isDeload, isTaper, hasInjury, weekNum, startDate, phaseName) {
  const days = [];
  const weekStart = new Date(startDate);
  weekStart.setDate(startDate.getDate() + (weekNum - 1) * 7 - startDate.getDay());
  const numTrain = trainDows.length;
  const level = profile.fitnessLevel || 'intermediate';
  const isEarlyBeginner = level === 'beginner' && weekNum <= 4;
  let otherTypes = buildWorkoutPattern(profile, numTrain, weekNum, phaseName, isDeload, hasInjury, isEarlyBeginner, weekStart);
  if (hasInjury) {
    // 傷況保護：間歇（衝擊最大）降成節奏跑，節奏跑保留；卡片會附「當天不穩就改輕鬆跑」提醒
    otherTypes = otherTypes.map(session => session.type === 'interval'
      ? { ...session, type: 'tempo', focus: 'steady', label: '節奏跑（傷況保護版）' }
      : session);
  }

  let otherIdx = 0;
  const today = todayStr();
  const longKm = profile.dayState.includes(2)
    ? calcLongRunKm(targetKm, numTrain, profile.maxLongRunMins, profile.easyPaceSec, isTaper, profile.goal)
    : 0;

  for (let dow = 0; dow < 7; dow++) {
    const date = new Date(weekStart);
    date.setDate(weekStart.getDate() + dow);
    const dateStr = localDateStr(date);
    if (profile.dayState[dow] === 2) {
      days.push(buildDayCard(dow, dateStr, 'long', longKm, profile, isDeload, isTaper, hasInjury, today, weekNum, phaseName));
    } else if (profile.dayState[dow] === 1) {
      const session = otherTypes[otherIdx] || { type: 'easy', focus: 'aerobic', label: '穩定有氧' };
      otherIdx += 1;
      const km = calcWorkoutKm(session.type, targetKm, profile.goal, longKm, session.focus);
      days.push(buildDayCard(dow, dateStr, session.type, km, profile, isDeload, isTaper, hasInjury, today, weekNum, phaseName, session.focus, session.label));
    } else {
      days.push(buildRestDayCard(dow, dateStr, profile, today, weekNum));
    }
  }

  return days;
}

function buildPlan(profile) {
  const totalWeeks = calcWeeks(profile.targetDate);
  const phases = buildPhases(profile.goal, totalWeeks);
  const rule = GOAL_RULES[profile.goal] || GOAL_RULES.half;
  const plan = [];
  const hasInjury = !profile.injuries.includes('none');
  // Anchor every generated week to the same saved plan date. Using a fresh
  // clock value here caused stale/corrupt saved plans to retain overlapping
  // week cards after a rebuild.
  const startDate = new Date(profile.generatedAt || Date.now());
  const longDow = profile.dayState.indexOf(2);
  const trainDows = profile.dayState.map((s, i) => (s >= 1 ? i : -1)).filter(i => i >= 0).sort((a, b) => a - b);
  const otherDows = trainDows.filter(d => d !== longDow);
  let baseKm = Math.min(Math.max(profile.weeklyKm * 1.03, 10), rule.maxWeeklyKm);

  phases.forEach(phase => {
    for (let wi = 0; wi < phase.weeks; wi++) {
      const weekNum = plan.length + 1;
      const weeksToRace = totalWeeks - weekNum + 1;
      const isTaper = weeksToRace <= rule.taperWeeks;
      const isDeload = weekNum % 4 === 0 && !isTaper && weekNum < totalWeeks;

      let targetKm = baseKm;
      if (isDeload) targetKm = baseKm * 0.8;
      else if (isTaper) {
        if (weeksToRace === 1) targetKm = Math.max(baseKm * 0.2, 8);
        else if (weeksToRace === 2) targetKm = baseKm * 0.5;
        else targetKm = baseKm * 0.7;
      }
      targetKm = Math.min(targetKm, rule.maxWeeklyKm);

      plan.push({
        weekNum,
        phase: phase.name,
        phaseLabel: phase.label,
        isDeload,
        isTaper,
        targetKm: Math.round(targetKm * 10) / 10,
        days: buildWeekDays(profile, trainDows, longDow, otherDows, targetKm, isDeload, isTaper, hasInjury, weekNum, startDate, phase.name)
      });

      if (!isDeload && !isTaper) {
        baseKm = Math.min(baseKm * (1 + rule.weeklyGrowth), rule.maxWeeklyKm);
      }
    }
  });

  return plan;
}

// ============================================================
// 滾動校準：每次教練資料更新，用 Garmin 實跑重排未來週
// ============================================================
function autoRecalibratePlan() {
  if (!coachReviewData?.updatedAt || !appData.profile || !Array.isArray(appData.plan) || !appData.plan.length) return null;
  if (appData.recalibratedFor === coachReviewData.updatedAt) return appData.lastRecalibration || null;
  const profile = appData.profile;
  const plan = appData.plan;
  const rule = GOAL_RULES[profile.goal] || GOAL_RULES.half;
  const today = todayStr();

  // 1. 跑量校準：最近完整週實跑 vs 課表目標
  const trend = Array.isArray(coachReviewData.trend) ? coachReviewData.trend.slice(-3) : [];
  const ratios = [];
  trend.forEach((entry) => {
    const week = plan.find((w) => Array.isArray(w.days) && w.days.some((d) => d.dateStr === entry.week));
    if (week && week.targetKm > 0 && entry.km > 0 && week.days[6].dateStr < today) {
      ratios.push(entry.km / week.targetKm);
    }
  });
  let volumeFactor = 1;
  if (ratios.length) {
    const avg = ratios.reduce((sum, r) => sum + r, 0) / ratios.length;
    if (avg < 0.9) volumeFactor = Math.max(avg, 0.75);      // 少跑 → 未來週降，最多 -25%
    else if (avg > 1.15) volumeFactor = Math.min(avg, 1.1); // 超跑 → 小步上調，最多 +10%
  }

  // 2. 質量配速校準：最近 T 區實跑中位 vs 課表節奏配速
  let tempoDelta = 0;
  try {
    const zones = hrZones(profile);
    const qualityRuns = (typeof coachRunRecords === 'function' ? coachRunRecords() : [])
      .slice(-14)
      .filter((run) => run.hr >= zones.tempoLow - 2 && run.hr <= zones.tempoHigh + 2 && run.paceSeconds > 0);
    if (qualityRuns.length >= 2) {
      const paces = qualityRuns.map((run) => run.paceSeconds).sort((a, b) => a - b);
      const median = paces[Math.floor(paces.length / 2)];
      const diff = profile.tempoPaceSec - median; // 正值＝實跑比課表快
      if (diff > 8) tempoDelta = -Math.min(Math.round(diff / 2), 10);       // 穩定偏快 → 下修（半步、封頂 10 秒）
      else if (diff < -15) tempoDelta = Math.min(Math.round(-diff / 2), 15); // 穩定偏慢 → 上修
      if (tempoDelta) {
        profile.tempoPaceSec += tempoDelta;
        profile.intervalPaceSec = Math.max(profile.tempoPaceSec - 22, 180);
      }
    }
  } catch (err) { /* 資料不足時跳過 */ }

  appData.recalibratedFor = coachReviewData.updatedAt;
  if (volumeFactor === 1 && !tempoDelta) {
    appData.lastRecalibration = null;
    saveData(appData);
    return null;
  }

  // 3. 只重排未來週；過去週與本週不動（本週由教練課表覆蓋）
  const hasInjury = !profile.injuries.includes('none');
  const startDate = new Date(profile.generatedAt || Date.now());
  const longDow = profile.dayState.indexOf(2);
  const trainDows = profile.dayState.map((s, i) => (s >= 1 ? i : -1)).filter((i) => i >= 0).sort((a, b) => a - b);
  const otherDows = trainDows.filter((d) => d !== longDow);
  plan.forEach((week) => {
    if (week.weekNum <= currentWeek) return;
    const newTarget = Math.min(Math.round(week.targetKm * volumeFactor * 10) / 10, rule.maxWeeklyKm);
    week.targetKm = newTarget;
    week.days = buildWeekDays(profile, trainDows, longDow, otherDows, newTarget, week.isDeload, week.isTaper, hasInjury, week.weekNum, startDate, week.phase);
  });
  const summary = { date: today, volumePct: Math.round(volumeFactor * 100), tempoDelta };
  appData.lastRecalibration = summary;
  saveData(appData);
  return summary;
}

function generateAndShowPlan() {
  if (appData.plan && appData.plan.length > 0) {
    if (!confirm('重新生成會取代目前計畫，訓練紀錄將保留。確定繼續？')) return;
  }
  const profile = {
    goal: formState.goal,
    targetDate: document.getElementById('f-date').value,
    targetTime: document.getElementById('f-target-time').value,
    dayState: [...formState.dayState],
    maxLongRunMins: parseInt(document.getElementById('f-long-max').value, 10),
    weeklyKm: parseFloat(document.getElementById('f-weekly-km').value) || 0,
    easyPace: document.getElementById('f-easy-pace').value,
    heightCm: parseFloat(document.getElementById('f-height')?.value) || 0,
    weightKg: parseFloat(document.getElementById('f-weight')?.value) || 0,
    maxHr: parseInt(document.getElementById('f-max-hr')?.value, 10) || 0,
    recentResult: document.getElementById('f-recent').value,
    injuries: [...formState.injuries],
    coachSync: {
      frequency: document.getElementById('f-coach-sync').value,
      time: document.getElementById('f-coach-time').value,
      day: parseInt(document.getElementById('f-coach-day').value, 10)
    },
    generatedAt: new Date().toISOString()
  };
  const dist = GOAL_DIST[profile.goal];
  const timeSec = timeToSec(profile.targetTime);
  profile.racePaceSec = timeSec / dist;
  profile.tempoPaceSec = profile.racePaceSec + 12;
  profile.intervalPaceSec = Math.max(profile.racePaceSec - 10, 180);
  profile.easyPaceSec = timeToSec(profile.easyPace);
  profile.fitnessLevel = fitnessLevel(profile);
  profile.planVersion = PLAN_SCHEMA_VERSION;
  adjustPaceByRecentResult(profile);

  appData.profile = profile;
  appData.plan = buildPlan(profile);
  appData.log = appData.log || [];
  appData.checkins = appData.checkins || [];
  appData.assessments = appData.assessments || [];
  appData.adaptationPrompts = {};
  saveData(appData);
  renderPlanView();
  showView('plan');
}

let currentWeek = 1;
let coachReviewData = null;

function renderPlanView() {
  renderHeroPanel();
  const el = document.getElementById('view-plan');

  el.innerHTML = `
<div class="plan-toolbar">

  <button class="tab" onclick="switchPlanTab('coach')">教練建議</button>

</div>
<div id="plan-tab-week" class="container">

</div>
