name: Refresh race weather

on:
  workflow_dispatch:
  schedule:
    # 07:00 Asia/Taipei daily, only races within 7 days are updated.
    - cron: "0 23 * * *"

permissions:
  contents: write

concurrency:
  group: race-weather-refresh
  cancel-in-progress: false

jobs:
  refresh-weather:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Update race weather forecast
        run: npm run data:weather

      - name: Validate generated files
        run: npm run check

      - name: Commit weather updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(data): refresh race weather"
          file_pattern: |
            runner/賽事/賽事資料庫.json
            site/data/races.json
