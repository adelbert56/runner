name: Refresh race weather

on:
  workflow_dispatch:
  schedule:
    # Primary: 07:23 Asia/Taipei daily, only races within 7 days are updated.
    # Avoid :00 because GitHub scheduled workflows are more likely to be delayed there.
    - cron: "23 23 * * *"
    # Backups: keep the daily weather refresh from depending on a single cron slot.
    - cron: "37 0 * * *"
    - cron: "7 3 * * *"

permissions:
  actions: write
  contents: write

concurrency:
  group: race-weather-refresh-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  refresh-weather:
    runs-on: ubuntu-latest
    steps:
      - name: Check recent weather refresh guard
        id: refresh-guard
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_RUN_ID: ${{ github.run_id }}
          EVENT_NAME: ${{ github.event_name }}
          SCHEDULE: ${{ github.event.schedule }}
          REPOSITORY: ${{ github.repository }}
        run: |
          if [ "$EVENT_NAME" != "schedule" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          lookback_hours=6
          runs_json="$(gh run list --repo "$REPOSITORY" --workflow weather-refresh.yml --branch main --limit 20 --json databaseId,createdAt,status,conclusion)"
          prior_count="$(printf '%s' "$runs_json" | jq --argjson current "$CURRENT_RUN_ID" --argjson lookback "$lookback_hours" '[.[] | select(.databaseId != $current) | select((now - (.createdAt | sub("\\.[0-9]+Z$"; "Z") | fromdateiso8601)) <= ($lookback * 3600)) | select((.conclusion == "success") or (.status == "in_progress") or (.status == "queued"))] | length')"

          if [ "$prior_count" -gt 0 ]; then
            echo "Weather workflow already succeeded within the last ${lookback_hours} hours; skipping backup trigger ($SCHEDULE)."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.refresh-guard.outputs.should_run == 'true'
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        if: steps.refresh-guard.outputs.should_run == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install Node dependencies
        if: steps.refresh-guard.outputs.should_run == 'true'
        run: npm ci

      - name: Update race weather forecast
        if: steps.refresh-guard.outputs.should_run == 'true'
        run: npm run data:weather

      - name: Sync site race data
        if: steps.refresh-guard.outputs.should_run == 'true'
        run: npm run data:sync

      - name: Build announcement and automation data
        if: steps.refresh-guard.outputs.should_run == 'true'
        run: npm run announcements:build && npm run automation:health

      - name: Validate generated files
        if: steps.refresh-guard.outputs.should_run == 'true'
        run: npm run check

      - name: Commit weather updates
        if: steps.refresh-guard.outputs.should_run == 'true'
        id: commit
        run: |
          bash .github/scripts/commit-generated.sh "chore(data): refresh race weather" \
            "runner/賽事/賽事資料庫.json" \
            "site/data/races.json" \
            "site/data/announcements.json" \
            "site/data/automation-health.json"

      - name: Trigger Pages deploy
        if: steps.refresh-guard.outputs.should_run == 'true' && steps.commit.outputs.did_push == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: gh workflow run --repo "$REPOSITORY" pages.yml --ref main

      - name: Wait for Pages deploy
        if: steps.refresh-guard.outputs.should_run == 'true' && steps.commit.outputs.did_push == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: bash .github/scripts/wait-for-pages-dispatch.sh
