name: Refresh race weather

on:
  workflow_dispatch:
  schedule:
    # Primary: 07:23 Asia/Taipei daily, only races within 7 days are updated.
    # Avoid :00 because GitHub scheduled workflows are more likely to be delayed there.
    - cron: "23 23 * * *"
    # Backups: keep the daily weather refresh from depending on a single cron slot.
    - cron: "37 0 * * *"
    - cron: "7 3 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: race-weather-refresh-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  refresh-weather:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check recent weather refresh guard
        id: refresh-guard
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_RUN_ID: ${{ github.run_id }}
          EVENT_NAME: ${{ github.event_name }}
          SCHEDULE: ${{ github.event.schedule }}
          REPOSITORY: ${{ github.repository }}
        run: |
          if [ "$EVENT_NAME" != "schedule" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          primary_cron="23 23 * * *"

          if [ "$SCHEDULE" = "$primary_cron" ]; then
            echo "Primary schedule trigger ($SCHEDULE); continuing."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          lookback_hours=6
          runs_json="$(gh run list --repo "$REPOSITORY" --workflow weather-refresh.yml --branch main --status success --limit 20 --json databaseId,createdAt)"
          prior_count="$(printf '%s' "$runs_json" | jq --argjson current "$CURRENT_RUN_ID" --argjson lookback "$lookback_hours" '[.[] | select(.databaseId != $current) | select((now - (.createdAt | sub("\\.[0-9]+Z$"; "Z") | fromdateiso8601)) <= ($lookback * 3600))] | length')"

          if [ "$prior_count" -gt 0 ]; then
            echo "Weather workflow already succeeded within the last ${lookback_hours} hours; skipping backup trigger ($SCHEDULE)."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.refresh-guard.outputs.should_run == 'true'
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        if: steps.refresh-guard.outputs.should_run == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Update race weather forecast
        if: steps.refresh-guard.outputs.should_run == 'true'
        run: npm run data:weather

      - name: Sync site race data
        if: steps.refresh-guard.outputs.should_run == 'true'
        run: npm run data:sync

      - name: Build announcement and automation data
        if: steps.refresh-guard.outputs.should_run == 'true'
        run: npm run announcements:build && npm run automation:health

      - name: Validate generated files
        if: steps.refresh-guard.outputs.should_run == 'true'
        run: npm run check

      - name: Commit weather updates
        if: steps.refresh-guard.outputs.should_run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- \
            "runner/賽事/賽事資料庫.json" \
            "site/data/races.json" \
            "site/data/announcements.json" \
            "site/data/automation-health.json"
          if git diff --cached --quiet; then
            echo "No weather changes to commit."
          else
            git commit -m "chore(data): refresh race weather"
            git pull --rebase --autostash
            git push
          fi

      - name: Setup Pages
        if: steps.refresh-guard.outputs.should_run == 'true'
        uses: actions/configure-pages@v5

      - name: Upload site
        if: steps.refresh-guard.outputs.should_run == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy
        if: steps.refresh-guard.outputs.should_run == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
