name: Refresh race weather

on:
  workflow_dispatch:
  schedule:
    # 07:00 Asia/Taipei daily, only races within 7 days are updated.
    - cron: "0 23 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: race-weather-refresh
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  refresh-weather:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Update race weather forecast
        run: npm run data:weather

      - name: Sync site race data
        run: npm run data:sync

      - name: Build announcement and automation data
        run: npm run announcements:build && npm run automation:health

      - name: Validate generated files
        run: npm run check

      - name: Commit weather updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- \
            "runner/賽事/賽事資料庫.json" \
            "site/data/races.json" \
            "site/data/announcements.json" \
            "site/data/automation-health.json"
          if git diff --cached --quiet; then
            echo "No weather changes to commit."
          else
            git commit -m "chore(data): refresh race weather"
            git pull --rebase --autostash
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
