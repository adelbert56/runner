name: Refresh race data

on:
  workflow_dispatch:
  schedule:
    # Primary: 18:00 Asia/Taipei every Tuesday and Thursday.
    - cron: "0 10 * * 2,4"
    # Backups: GitHub scheduled workflows can be delayed or skipped under load.
    # These keep the twice-weekly crawler from depending on a single cron slot.
    - cron: "30 11 * * 2,4"
    - cron: "0 13 * * 2,4"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: race-data-refresh-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  refresh:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check recent refresh guard
        id: refresh-guard
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_RUN_ID: ${{ github.run_id }}
          EVENT_NAME: ${{ github.event_name }}
          SCHEDULE: ${{ github.event.schedule }}
          REPOSITORY: ${{ github.repository }}
        run: |
          if [ "$EVENT_NAME" != "schedule" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          primary_cron="0 10 * * 2,4"

          if [ "$SCHEDULE" = "$primary_cron" ]; then
            echo "Primary schedule trigger ($SCHEDULE); continuing."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Backups should only guard against skipped cron delivery; avoid repeated commits if a
          # run already happened recently (even if it later failed during Pages deployment).
          lookback_hours=18
          runs_json="$(gh run list --repo "$REPOSITORY" --workflow data-refresh.yml --branch main --status completed --limit 20 --json databaseId,createdAt)"
          prior_count="$(printf '%s' "$runs_json" | jq --argjson current "$CURRENT_RUN_ID" --argjson lookback "$lookback_hours" '[.[] | select(.databaseId != $current) | select((now - (.createdAt | sub("\\.[0-9]+Z$"; "Z") | fromdateiso8601)) <= ($lookback * 3600))] | length')"

          if [ "$prior_count" -gt 0 ]; then
            echo "Race data workflow already ran within the last ${lookback_hours} hours; skipping backup trigger ($SCHEDULE)."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.refresh-guard.outputs.should_run == 'true'
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup uv
        if: steps.refresh-guard.outputs.should_run == 'true'
        uses: astral-sh/setup-uv@v7

      - name: Setup Python
        if: steps.refresh-guard.outputs.should_run == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup Node
        if: steps.refresh-guard.outputs.should_run == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install scraper dependencies
        if: steps.refresh-guard.outputs.should_run == 'true'
        run: uv sync

      - name: Run race scrapers
        if: steps.refresh-guard.outputs.should_run == 'true'
        run: uv run python scripts/main.py

      - name: Enrich official platform details
        if: steps.refresh-guard.outputs.should_run == 'true'
        run: uv run python scripts/enrich_platforms.py

      - name: Apply manual supplements and quality report
        if: steps.refresh-guard.outputs.should_run == 'true'
        run: npm run data:refresh

      - name: Run strict data quality gate
        # Scheduled crawls should keep publishing updates + reports even when
        # a single race is missing optional-but-important fields; strict mode
        # remains enforced for manual runs.
        if: steps.refresh-guard.outputs.should_run == 'true' && github.event_name != 'schedule'
        run: npm run data:quality:strict

      - name: Update race weather forecast
        if: steps.refresh-guard.outputs.should_run == 'true'
        run: npm run data:weather

      - name: Sync site race data
        if: steps.refresh-guard.outputs.should_run == 'true'
        run: npm run data:sync

      - name: Build operational dashboard
        if: steps.refresh-guard.outputs.should_run == 'true'
        run: npm run ops:dashboard

      - name: Build announcement and automation data
        if: steps.refresh-guard.outputs.should_run == 'true'
        run: npm run announcements:build && npm run automation:health

      - name: Validate generated files
        if: steps.refresh-guard.outputs.should_run == 'true'
        run: npm run check

      - name: Commit data updates
        if: steps.refresh-guard.outputs.should_run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- \
            "runner/賽事/賽事資料庫.json" \
            "runner/賽事/中部賽事列表.md" \
            "runner/賽事/爬蟲日誌.md" \
            "runner/賽事/待補資料佇列.json" \
            "runner/賽事/資料品質報告.md" \
            "runner/賽事/開報後待補資料報告.md" \
            "runner/賽事/開報後待補資料報告.json" \
            "runner/賽事/報名日期異常報告.md" \
            "runner/賽事/報名日期異常報告.json" \
            "runner/賽事/起跑時間品質報告.md" \
            "runner/賽事/起跑時間品質報告.json" \
            "runner/賽事/爬蟲追蹤計畫.md" \
            "runner/賽事/爬蟲追蹤計畫.json" \
            "runner/賽事/平台爬蟲覆蓋報告.md" \
            "runner/賽事/平台穩定度報告.md" \
            "runner/賽事/平台穩定度報告.json" \
            "runner/系統配置/營運儀表板.md" \
            "runner/系統配置/營運儀表板.json" \
            "site/data/races.json" \
            "site/data/announcements.json" \
            "site/data/automation-health.json"
          if git diff --cached --quiet; then
            echo "No race data changes to commit."
          else
            git commit -m "chore(data): refresh race data"
            git pull --rebase --autostash
            git push
          fi

      - name: Setup Pages
        if: steps.refresh-guard.outputs.should_run == 'true'
        uses: actions/configure-pages@v5

      - name: Upload site
        if: steps.refresh-guard.outputs.should_run == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy
        if: steps.refresh-guard.outputs.should_run == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
