name: Refresh race data

on:
  workflow_dispatch:
    inputs:
      strict:
        description: "Fail the run if strict data quality gate fails"
        type: boolean
        required: false
        default: false
  schedule:
    # Primary: 18:17 Asia/Taipei every Tuesday and Thursday.
    # Avoid :00 because GitHub scheduled workflows are more likely to be delayed there.
    - cron: "17 10 * * 2,4"
    # Backups: GitHub scheduled workflows can be delayed or skipped under load.
    # These keep the twice-weekly crawler from depending on a single cron slot.
    - cron: "47 11 * * 2,4"
    - cron: "17 13 * * 2,4"
    - cron: "47 15 * * 2,4"

permissions:
  actions: write
  contents: write
  issues: write

concurrency:
  group: race-data-refresh-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check recent refresh guard
        id: refresh-guard
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_RUN_ID: ${{ github.run_id }}
          EVENT_NAME: ${{ github.event_name }}
          SCHEDULE: ${{ github.event.schedule }}
          REPOSITORY: ${{ github.repository }}
        run: |
          if [ "$EVENT_NAME" != "schedule" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Scheduled runs can arrive hours late. All schedule slots, including
          # the primary slot, skip when another refresh already succeeded or is
          # actively running in the current window.
          lookback_hours=18
          runs_json="$(gh run list --repo "$REPOSITORY" --workflow data-refresh.yml --branch main --limit 30 --json databaseId,createdAt,status,conclusion)"
          prior_count="$(printf '%s' "$runs_json" | jq --argjson current "$CURRENT_RUN_ID" --argjson lookback "$lookback_hours" '[.[] | select(.databaseId != $current) | select((now - (.createdAt | sub("\\.[0-9]+Z$"; "Z") | fromdateiso8601)) <= ($lookback * 3600)) | select((.conclusion == "success") or (.status == "in_progress") or (.status == "queued"))] | length')"

          if [ "$prior_count" -gt 0 ]; then
            echo "Race data workflow already succeeded within the last ${lookback_hours} hours; skipping backup trigger ($SCHEDULE)."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.refresh-guard.outputs.should_run == 'true'
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup uv
        if: steps.refresh-guard.outputs.should_run == 'true'
        uses: astral-sh/setup-uv@v7

      - name: Setup Python
        if: steps.refresh-guard.outputs.should_run == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup Node
        if: steps.refresh-guard.outputs.should_run == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install scraper dependencies
        if: steps.refresh-guard.outputs.should_run == 'true'
        run: uv sync

      - name: Run race scrapers
        if: steps.refresh-guard.outputs.should_run == 'true'
        run: uv run python scripts/main.py

      - name: Enrich official platform details
        if: steps.refresh-guard.outputs.should_run == 'true'
        run: uv run python scripts/enrich_platforms.py

      - name: Apply manual supplements and quality report
        if: steps.refresh-guard.outputs.should_run == 'true'
        run: npm run data:refresh

      - name: Run strict data quality gate
        # Scheduled crawls should keep publishing updates + reports even when
        # a single race is missing optional-but-important fields; strict mode
        # is opt-in for manual runs.
        if: steps.refresh-guard.outputs.should_run == 'true' && github.event_name != 'schedule' && inputs.strict
        run: npm run data:quality:strict

      - name: Update race weather forecast
        if: steps.refresh-guard.outputs.should_run == 'true'
        run: npm run data:weather

      - name: Sync site race data
        if: steps.refresh-guard.outputs.should_run == 'true'
        run: npm run data:sync

      - name: Build operational dashboard
        if: steps.refresh-guard.outputs.should_run == 'true'
        run: npm run ops:dashboard

      - name: Build announcement and automation data
        if: steps.refresh-guard.outputs.should_run == 'true'
        run: npm run announcements:build && npm run automation:health

      - name: Validate generated files
        if: steps.refresh-guard.outputs.should_run == 'true'
        run: npm run check

      - name: Report scraper errors
        if: steps.refresh-guard.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          status_file="runner/賽事/爬蟲最後狀態.json"
          if [ ! -f "$status_file" ]; then
            echo "No scrape status file found; skipping issue report."
            exit 0
          fi

          has_errors="$(jq -r '.has_errors // false' "$status_file")"
          if [ "$has_errors" != "true" ]; then
            echo "No scraper errors."
            exit 0
          fi

          scrape_date="$(jq -r '.scrape_date // ""' "$status_file")"
          errors="$(jq -r '.errors[]? // empty' "$status_file" | head -n 20)"
          body=$(
            printf '%s\n\n%s\n\n%s\n' \
              "Scraper reported errors on ${scrape_date:-unknown date}." \
              "Run: ${RUN_URL}" \
              "${errors:-"(no error details)"}"
          )

          existing_number="$(gh issue list --repo "$REPOSITORY" --state open --search "Race crawler health" --json number,title --jq '.[0].number // empty')"
          if [ -z "$existing_number" ]; then
            gh issue create --repo "$REPOSITORY" --title "Race crawler health" --body "$body"
          else
            gh issue comment --repo "$REPOSITORY" "$existing_number" --body "$body"
          fi

      - name: Commit data updates
        if: steps.refresh-guard.outputs.should_run == 'true'
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- \
            "runner/賽事/賽事資料庫.json" \
            "runner/賽事/中部賽事列表.md" \
            "runner/賽事/爬蟲日誌.md" \
            "runner/賽事/爬蟲最後狀態.json" \
            "runner/賽事/待補資料佇列.json" \
            "runner/賽事/資料品質報告.md" \
            "runner/賽事/開報後待補資料報告.md" \
            "runner/賽事/開報後待補資料報告.json" \
            "runner/賽事/報名日期異常報告.md" \
            "runner/賽事/報名日期異常報告.json" \
            "runner/賽事/起跑時間品質報告.md" \
            "runner/賽事/起跑時間品質報告.json" \
            "runner/賽事/爬蟲追蹤計畫.md" \
            "runner/賽事/爬蟲追蹤計畫.json" \
            "runner/賽事/平台爬蟲覆蓋報告.md" \
            "runner/賽事/平台穩定度報告.md" \
            "runner/賽事/平台穩定度報告.json" \
            "runner/系統配置/營運儀表板.md" \
            "runner/系統配置/營運儀表板.json" \
            "site/data/races.json" \
            "site/data/announcements.json" \
            "site/data/automation-health.json"
          if git diff --cached --quiet; then
            echo "No race data changes to commit."
            echo "did_push=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore(data): refresh race data"
            git pull --rebase --autostash
            git push
            echo "did_push=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Pages deploy
        if: steps.refresh-guard.outputs.should_run == 'true' && steps.commit.outputs.did_push == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: gh workflow run --repo "$REPOSITORY" pages.yml --ref main
