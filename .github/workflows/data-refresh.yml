name: Refresh race data

on:
  workflow_dispatch:
  schedule:
    # 18:00 Asia/Taipei every Tuesday and Thursday.
    - cron: "0 10 * * 2,4"

permissions:
  contents: write

concurrency:
  group: race-data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install scraper dependencies
        run: uv sync

      - name: Run race scrapers
        run: uv run python scripts/main.py

      - name: Enrich official platform details
        run: uv run python scripts/enrich_platforms.py

      - name: Apply manual supplements and quality report
        run: npm run data:refresh

      - name: Build operational dashboard
        run: npm run ops:dashboard

      - name: Validate generated files
        run: npm run check

      - name: Commit data updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(data): refresh race data"
          file_pattern: |
            runner/赛事/赛事数据库.json
            runner/赛事/中部赛事列表.md
            runner/赛事/爬虫日志.md
            runner/赛事/待补资料队列.json
            runner/赛事/资料品质报告.md
            runner/赛事/开报后待补资料报告.md
            runner/赛事/开报后待补资料报告.json
            runner/赛事/报名日期异常报告.md
            runner/赛事/报名日期异常报告.json
            runner/赛事/爬虫追踪计划.md
            runner/赛事/爬虫追踪计划.json
            runner/赛事/平台爬虫覆盖报告.md
            runner/赛事/平台稳定度报告.md
            runner/赛事/平台稳定度报告.json
            runner/系统配置/营运仪表板.md
            runner/系统配置/营运仪表板.json
            site/data/races.json
