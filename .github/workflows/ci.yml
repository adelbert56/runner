name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python dependencies
        run: uv sync

      - name: Install Playwright
        run: |
          npm install --no-save playwright@1.56.1
          npx playwright install --with-deps chromium

      - name: Check JavaScript and content baseline
        run: npm run check

      - name: Run strict data quality gate
        run: npm run data:quality:strict

      - name: Run strict content quality gate
        run: npm run content:quality:strict

      - name: Check Python syntax
        run: uv run python -m compileall scripts

      - name: Check browser layout
        run: npm run ui:layout
