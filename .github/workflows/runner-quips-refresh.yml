name: Refresh runner quips

on:
  workflow_dispatch:
  schedule:
    # 10:00 Asia/Taipei every Monday.
    - cron: "0 2 * * 1"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: runner-quips-refresh
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  refresh:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Promote runner quips
        run: npm run quips:refresh

      - name: Build announcement and automation data
        run: npm run announcements:build && npm run automation:health

      - name: Validate scripts
        run: npm run check

      - name: Commit runner quips
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- \
            "site/data/runner-quips.json" \
            "runner/內容/跑者碎念候補.json" \
            "site/data/announcements.json" \
            "site/data/automation-health.json"
          if git diff --cached --quiet; then
            echo "No runner quip changes to commit."
          else
            git commit -m "chore(content): refresh runner quips"
            git pull --rebase --autostash
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
