name: Refresh message cloud

on:
  workflow_dispatch:
  schedule:
    # Around 12:00 and 18:00 Asia/Taipei daily.
    # Avoid exact :00 because GitHub scheduled workflows are more likely to be delayed there.
    - cron: "7 4 * * *"
    - cron: "7 10 * * *"

permissions:
  actions: write
  contents: write
  issues: read

concurrency:
  group: message-cloud-refresh-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  MESSAGE_CLOUD_ISSUE_NUMBER: "34"

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check recent message cloud refresh guard
        id: refresh-guard
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_RUN_ID: ${{ github.run_id }}
          EVENT_NAME: ${{ github.event_name }}
          SCHEDULE: ${{ github.event.schedule }}
          REPOSITORY: ${{ github.repository }}
        run: |
          if [ "$EVENT_NAME" != "schedule" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          lookback_hours=8
          runs_json="$(gh run list --repo "$REPOSITORY" --workflow message-cloud-refresh.yml --branch main --limit 20 --json databaseId,createdAt,status,conclusion)"
          prior_count="$(printf '%s' "$runs_json" | jq --argjson current "$CURRENT_RUN_ID" --argjson lookback "$lookback_hours" '[.[] | select(.databaseId != $current) | select((now - (.createdAt | sub("\\.[0-9]+Z$"; "Z") | fromdateiso8601)) <= ($lookback * 3600)) | select((.conclusion == "success") or (.status == "in_progress") or (.status == "queued"))] | length')"

          if [ "$prior_count" -gt 0 ]; then
            echo "Message cloud workflow already succeeded within the last ${lookback_hours} hours; skipping backup trigger ($SCHEDULE)."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.refresh-guard.outputs.should_run == 'true'
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        if: steps.refresh-guard.outputs.should_run == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Build message cloud
        if: steps.refresh-guard.outputs.should_run == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: npm run message-cloud:build

      - name: Validate scripts
        if: steps.refresh-guard.outputs.should_run == 'true'
        run: npm run check

      - name: Commit message cloud
        if: steps.refresh-guard.outputs.should_run == 'true'
        id: commit
        run: |
          bash .github/scripts/commit-generated.sh "chore(site): refresh message cloud" "site/data/message-cloud.json"

      - name: Trigger Pages deploy
        if: steps.refresh-guard.outputs.should_run == 'true' && steps.commit.outputs.did_push == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: gh workflow run --repo "$REPOSITORY" pages.yml --ref main

      - name: Wait for Pages deploy
        if: steps.refresh-guard.outputs.should_run == 'true' && steps.commit.outputs.did_push == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          expected_sha="$(git rev-parse HEAD)"
          pages_run_id=""

          for _ in $(seq 1 60); do
            pages_run_id="$(
              gh run list --repo "$REPOSITORY" --workflow pages.yml --branch main --limit 10 \
                --json databaseId,headSha,event \
              | jq -r --arg sha "$expected_sha" '
                  [.[] | select(.event == "workflow_dispatch" and .headSha == $sha)][0].databaseId // empty
                '
            )"

            if [ -n "$pages_run_id" ]; then
              break
            fi

            sleep 10
          done

          if [ -z "$pages_run_id" ]; then
            echo "Timed out waiting for Pages workflow dispatch for commit $expected_sha."
            exit 1
          fi

          pages_run_url="$(gh run view --repo "$REPOSITORY" "$pages_run_id" --json url --jq '.url')"
          echo "Waiting for Pages workflow: $pages_run_url"
          gh run watch --repo "$REPOSITORY" "$pages_run_id" --exit-status
