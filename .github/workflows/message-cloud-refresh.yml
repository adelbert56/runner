name: Refresh message cloud

on:
  workflow_dispatch:
  schedule:
    # Around 12:00 and 18:00 Asia/Taipei daily.
    # Avoid exact :00 because GitHub scheduled workflows are more likely to be delayed there.
    - cron: "7 4 * * *"
    - cron: "7 10 * * *"

permissions:
  actions: write
  contents: write
  issues: read

concurrency:
  group: message-cloud-refresh-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  MESSAGE_CLOUD_ISSUE_NUMBER: "34"

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Build message cloud
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: npm run message-cloud:build

      - name: Validate scripts
        run: npm run check

      - name: Commit message cloud
        id: commit
        run: |
          bash .github/scripts/commit-generated.sh "chore(site): refresh message cloud" "site/data/message-cloud.json"

      - name: Trigger Pages deploy
        if: steps.commit.outputs.did_push == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: gh workflow run --repo "$REPOSITORY" pages.yml --ref main
