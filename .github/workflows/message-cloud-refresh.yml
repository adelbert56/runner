name: Refresh message cloud

on:
  workflow_dispatch:
  schedule:
    # Around 12:00 and 18:00 Asia/Taipei daily.
    # Avoid exact :00 because GitHub scheduled workflows are more likely to be delayed there.
    - cron: "7 4 * * *"
    - cron: "7 10 * * *"

permissions:
  contents: write
  issues: read
  pages: write
  id-token: write

concurrency:
  group: message-cloud-refresh-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  MESSAGE_CLOUD_ISSUE_NUMBER: "34"

jobs:
  refresh:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Build message cloud
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: npm run message-cloud:build

      - name: Validate scripts
        run: npm run check

      - name: Commit message cloud
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- "site/data/message-cloud.json"
          if git diff --cached --quiet; then
            echo "No message cloud changes to commit."
          else
            git commit -m "chore(site): refresh message cloud"
            git pull --rebase --autostash
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
