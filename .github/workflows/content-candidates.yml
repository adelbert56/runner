name: Collect content candidates

on:
  workflow_dispatch:
  schedule:
    # 09:00 Asia/Taipei every Monday, Wednesday, and Friday.
    - cron: "0 1 * * 1,3,5"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: content-candidates
  cancel-in-progress: false

jobs:
  collect:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Collect and publish running content
        run: npm run content:refresh

      - name: Run strict content quality gate
        run: npm run content:quality:strict

      - name: Build operational dashboard
        run: npm run ops:dashboard

      - name: Build automation health data
        run: npm run automation:health

      - name: Validate scripts
        run: npm run check

      - name: Commit content candidates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(content): refresh running content candidates"
          file_pattern: |
            runner/內容/候選內容.json
            runner/內容/候選內容報告.md
            runner/內容/內容來源健康度報告.md
            runner/內容/內容來源健康度報告.json
            runner/內容/自動上架內容報告.md
            runner/內容/內容品質報告.md
            site/data/content.json
            runner/系統配置/營運儀表板.md
            runner/系統配置/營運儀表板.json
            site/data/automation-health.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
