name: Collect content candidates

on:
  workflow_dispatch:
  schedule:
    # Primary: 09:17 Asia/Taipei every day.
    # Avoid :00 because GitHub scheduled workflows are more likely to be delayed there.
    - cron: "17 1 * * *"
    # Backups: GitHub scheduled workflows can be delayed or skipped under load.
    - cron: "37 2 * * *"
    - cron: "17 4 * * *"
    - cron: "47 5 * * *"

permissions:
  actions: write
  contents: write

concurrency:
  group: content-candidates-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Check recent content refresh guard
        id: refresh-guard
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_RUN_ID: ${{ github.run_id }}
          EVENT_NAME: ${{ github.event_name }}
          SCHEDULE: ${{ github.event.schedule }}
          REPOSITORY: ${{ github.repository }}
        run: |
          if [ "$EVENT_NAME" != "schedule" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Scheduled runs can arrive hours late. All schedule slots, including
          # the primary slot, skip when another refresh already succeeded or is
          # actively running in the current window.
          lookback_hours=8
          runs_json="$(gh run list --repo "$REPOSITORY" --workflow content-candidates.yml --branch main --limit 20 --json databaseId,createdAt,status,conclusion)"
          prior_count="$(printf '%s' "$runs_json" | jq --argjson current "$CURRENT_RUN_ID" --argjson lookback "$lookback_hours" '[.[] | select(.databaseId != $current) | select((now - (.createdAt | sub("\\.[0-9]+Z$"; "Z") | fromdateiso8601)) <= ($lookback * 3600)) | select((.conclusion == "success") or (.status == "in_progress") or (.status == "queued"))] | length')"

          if [ "$prior_count" -gt 0 ]; then
            echo "Content workflow already succeeded within the last ${lookback_hours} hours; skipping backup trigger ($SCHEDULE)."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.refresh-guard.outputs.should_run == 'true'
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        if: steps.refresh-guard.outputs.should_run == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install Node dependencies
        if: steps.refresh-guard.outputs.should_run == 'true'
        run: npm ci

      - name: Collect and publish running content
        if: steps.refresh-guard.outputs.should_run == 'true'
        run: npm run content:refresh

      - name: Run strict content quality gate
        if: steps.refresh-guard.outputs.should_run == 'true'
        run: npm run content:quality:strict

      - name: Build operational dashboard
        if: steps.refresh-guard.outputs.should_run == 'true'
        run: npm run ops:dashboard

      - name: Build automation health data
        if: steps.refresh-guard.outputs.should_run == 'true'
        run: npm run automation:health

      - name: Validate scripts
        if: steps.refresh-guard.outputs.should_run == 'true'
        run: npm run check

      - name: Commit content candidates
        if: steps.refresh-guard.outputs.should_run == 'true'
        id: commit
        run: |
          bash .github/scripts/commit-generated.sh "chore(content): refresh running content candidates" \
            "runner/內容/候選內容.json" \
            "runner/內容/候選內容庫.json" \
            "runner/內容/候選內容報告.md" \
            "runner/內容/內容來源健康度報告.md" \
            "runner/內容/內容來源健康度報告.json" \
            "runner/內容/自動上架內容報告.md" \
            "runner/內容/內容品質報告.md" \
            "site/data/content.json" \
            "runner/系統配置/營運儀表板.md" \
            "runner/系統配置/營運儀表板.json" \
            "site/data/automation-health.json"

      - name: Trigger Pages deploy
        if: steps.refresh-guard.outputs.should_run == 'true' && steps.commit.outputs.did_push == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: gh workflow run --repo "$REPOSITORY" pages.yml --ref main

      - name: Wait for Pages deploy
        if: steps.refresh-guard.outputs.should_run == 'true' && steps.commit.outputs.did_push == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: bash .github/scripts/wait-for-pages-dispatch.sh
