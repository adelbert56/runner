name: Collect content candidates

on:
  workflow_dispatch:
  schedule:
    # Primary: 09:00 Asia/Taipei every Monday, Wednesday, and Friday.
    - cron: "0 1 * * 1,3,5"
    # Backups: GitHub scheduled workflows can be delayed or skipped under load.
    - cron: "0 3 * * 1,3,5"
    - cron: "0 5 * * 1,3,5"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: content-candidates-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  collect:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check recent content refresh guard
        id: refresh-guard
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_RUN_ID: ${{ github.run_id }}
          EVENT_NAME: ${{ github.event_name }}
          SCHEDULE: ${{ github.event.schedule }}
          REPOSITORY: ${{ github.repository }}
        run: |
          if [ "$EVENT_NAME" != "schedule" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          primary_cron="0 1 * * 1,3,5"

          if [ "$SCHEDULE" = "$primary_cron" ]; then
            echo "Primary schedule trigger ($SCHEDULE); continuing."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Backup triggers should avoid repeated commits when the primary run already happened
          # (even if it later failed during Pages deployment). The backups exist mainly to cover
          # delayed/skipped cron delivery, not to retry failed executions.
          lookback_hours=8
          runs_json="$(gh run list --repo "$REPOSITORY" --workflow content-candidates.yml --branch main --status completed --limit 20 --json databaseId,createdAt)"
          prior_count="$(printf '%s' "$runs_json" | jq --argjson current "$CURRENT_RUN_ID" --argjson lookback "$lookback_hours" '[.[] | select(.databaseId != $current) | select((now - (.createdAt | sub("\\.[0-9]+Z$"; "Z") | fromdateiso8601)) <= ($lookback * 3600))] | length')"

          if [ "$prior_count" -gt 0 ]; then
            echo "Content workflow already ran within the last ${lookback_hours} hours; skipping backup trigger ($SCHEDULE)."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.refresh-guard.outputs.should_run == 'true'
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        if: steps.refresh-guard.outputs.should_run == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Collect and publish running content
        if: steps.refresh-guard.outputs.should_run == 'true'
        run: npm run content:refresh

      - name: Run strict content quality gate
        if: steps.refresh-guard.outputs.should_run == 'true'
        run: npm run content:quality:strict

      - name: Build operational dashboard
        if: steps.refresh-guard.outputs.should_run == 'true'
        run: npm run ops:dashboard

      - name: Build automation health data
        if: steps.refresh-guard.outputs.should_run == 'true'
        run: npm run automation:health

      - name: Validate scripts
        if: steps.refresh-guard.outputs.should_run == 'true'
        run: npm run check

      - name: Commit content candidates
        if: steps.refresh-guard.outputs.should_run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- \
            "runner/內容/候選內容.json" \
            "runner/內容/候選內容庫.json" \
            "runner/內容/候選內容報告.md" \
            "runner/內容/內容來源健康度報告.md" \
            "runner/內容/內容來源健康度報告.json" \
            "runner/內容/自動上架內容報告.md" \
            "runner/內容/內容品質報告.md" \
            "site/data/content.json" \
            "runner/系統配置/營運儀表板.md" \
            "runner/系統配置/營運儀表板.json" \
            "site/data/automation-health.json"
          if git diff --cached --quiet; then
            echo "No content changes to commit."
          else
            git commit -m "chore(content): refresh running content candidates"
            git pull --rebase --autostash
            git push
          fi

      - name: Setup Pages
        if: steps.refresh-guard.outputs.should_run == 'true'
        uses: actions/configure-pages@v5

      - name: Upload site
        if: steps.refresh-guard.outputs.should_run == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy
        if: steps.refresh-guard.outputs.should_run == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
